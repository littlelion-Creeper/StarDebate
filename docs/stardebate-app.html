<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarDebate ★ 辩之星 | AI专业辩论备赛助手</title>
<link rel="icon" type="image/x-icon" href="../StarDebate.ico">
<style>
/* ===== CSS Variables (Catppuccin Mocha) ===== */
:root {
  --bg-base: #1e1e2e;
  --bg-mantle: #181825;
  --bg-crust: #11111b;
  --bg-surface0: #313244;
  --bg-surface1: #45475a;
  --bg-surface2: #585b70;
  --text: #cdd6f4;
  --subtext0: #a6adc8;
  --subtext1: #bac2de;
  --overlay0: #6c7086;
  --overlay1: #7f849c;
  --green: #a6e3a1;
  --red: #f38ba8;
  --blue: #89b4fa;
  --yellow: #f9e2af;
  --peach: #fab387;
  --mauve: #cba6f7;
  --pink: #f5c2e7;
  --teal: #94e2d5;
  --gold: #dfb460;
  --nav-w: 56px;
  --left-panel-w: 280px;
  --right-panel-w: 420px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-mantle);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg-surface1); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--bg-surface2); }

/* ===== App Layout ===== */
#app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ===== Left Navigation ===== */
#left-nav {
  width: var(--nav-w);
  background: var(--bg-crust);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  border-right: 1px solid var(--bg-surface0);
  flex-shrink: 0;
  overflow-y: auto;
}
.nav-btn {
  width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: none; border-radius: 10px;
  color: var(--overlay0);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.nav-btn:hover { background: var(--bg-surface0); color: var(--text); }
.nav-btn.active { background: var(--bg-surface0); color: var(--gold); }
.nav-btn .badge {
  position: absolute; top: 2px; right: 2px;
  width: 8px; height: 8px;
  background: var(--red); border-radius: 50%;
  display: none;
}
.nav-divider {
  width: 28px; height: 1px;
  background: var(--bg-surface0);
  margin: 4px 0;
}

/* ===== Left Panel ===== */
#left-panel {
  width: var(--left-panel-w);
  background: var(--bg-base);
  border-right: 1px solid var(--bg-surface0);
  display: flex; flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.25s ease;
}
#left-panel.collapsed { width: 0; }
.panel-header {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--subtext0);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--bg-surface0);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-header .hint {
  font-size: 10px; color: var(--overlay0);
  font-weight: 400;
  cursor: pointer;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

/* ===== Project Tree ===== */
.tree-item {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--subtext0);
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.tree-item:hover { background: var(--bg-surface0); color: var(--text); }
.tree-item.active { background: var(--bg-surface0); color: var(--text); border-left: 3px solid var(--gold); padding-left: 9px; }
.tree-item .folder-icon { color: var(--yellow); font-size: 14px; }
.tree-item .file-icon { color: var(--overlay0); font-size: 12px; }
.tree-item .debate-icon { color: var(--mauve); }
.tree-item-indent { padding-left: 28px; }

/* ===== Structure Tree ===== */
.structure-toggle {
  display: flex; gap: 2px; margin-bottom: 8px;
}
.structure-toggle button {
  flex: 1; padding: 6px;
  border: 1px solid var(--bg-surface0); border-radius: 6px;
  background: transparent; color: var(--overlay0);
  font-size: 11px; cursor: pointer;
  transition: all 0.12s;
}
.structure-toggle button.active {
  background: var(--bg-surface0);
  color: var(--green);
  border-color: var(--green);
}
.structure-tree .tree-item { padding: 4px 8px; font-size: 12px; }
.st-action {
  display: flex; gap: 6px; padding: 8px 0; border-top: 1px solid var(--bg-surface0); margin-top: 8px;
}
.small-btn {
  padding: 5px 10px; font-size: 11px;
  background: var(--bg-surface0); color: var(--subtext0);
  border: none; border-radius: 5px;
  cursor: pointer; transition: all 0.12s;
}
.small-btn:hover { color: var(--text); background: var(--bg-surface1); }
.small-btn.primary {
  background: rgba(203, 166, 247, 0.12);
  color: var(--mauve);
}
.small-btn.primary:hover { background: rgba(203, 166, 247, 0.22); }

/* ===== Format Browser ===== */
.format-list { display: flex; flex-direction: column; gap: 4px; }
.format-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.12s;
}
.format-item:hover { background: var(--bg-surface0); }
.format-item.selected { border-color: var(--gold); background: rgba(223,180,96,0.06); }
.format-item .format-name { font-size:13px; font-weight:600; color:var(--text); }
.format-item .format-desc { font-size:11px; color:var(--overlay0); margin-top:2px; }
.format-detail {
  margin-top: 10px; padding: 14px;
  background: var(--bg-surface0); border-radius: 8px;
  font-size: 12px; color: var(--subtext0);
}
.format-detail .fd-title { font-size:13px; color:var(--gold); font-weight:600; margin-bottom:8px; }
.format-detail .fd-row { display:flex; justify-content:space-between; padding:3px 0; }
.format-detail .fd-phase { color:var(--subtext1); }
.format-detail .fd-time { color:var(--overlay0); font-size:11px; }

/* ===== Center Panel ===== */
#center-panel {
  flex: 1;
  display: flex; flex-direction: column;
  background: var(--bg-mantle);
  overflow: hidden;
  min-width: 0;
}
.centre-header {
  padding: 12px 20px;
  font-size: 15px; font-weight: 600;
  border-bottom: 1px solid var(--bg-surface0);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.centre-header .back-btn {
  background: transparent; border: none;
  color: var(--overlay0); font-size: 18px;
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.centre-header .back-btn:hover { color: var(--text); background: var(--bg-surface0); }
.centre-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column;
}

/* ===== Empty State ===== */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  gap: 12px;
  color: var(--overlay0);
}
.empty-state .es-icon { font-size: 48px; opacity: 0.5; }
.empty-state .es-title { font-size: 20px; color: var(--subtext0); font-weight: 600; }
.empty-state .es-desc { font-size: 13px; max-width: 360px; line-height: 1.7; }

/* ===== Speech Editor ===== */
.editor-tabs {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--bg-surface0);
  margin-bottom: 12px;
}
.editor-tab {
  padding: 8px 16px;
  border: none; background: transparent;
  color: var(--overlay0); font-size: 12px;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.12s;
}
.editor-tab.active {
  color: var(--text);
  border-bottom-color: var(--blue);
}
.editor-tab.pro-tab.active { border-bottom-color: var(--green); }
.editor-tab.con-tab.active { border-bottom-color: var(--red); }
.speech-editor-wrap {
  flex: 1;
  display: flex;
  background: var(--bg-crust);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  overflow: hidden;
}
.line-numbers {
  width: 44px;
  padding: 12px 0;
  background: var(--bg-mantle);
  color: var(--overlay0);
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 12px; line-height: 1.7;
  text-align: right;
  user-select: none;
  overflow: hidden;
  border-right: 1px solid var(--bg-surface0);
}
.line-numbers div { padding: 0 8px; }
#speech-editor {
  flex: 1;
  padding: 12px 16px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 13px; line-height: 1.7;
  resize: none;
  outline: none;
}
.editor-actions {
  display: flex; gap: 8px;
  padding: 10px 0;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 16px;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.12s;
}
.btn-save { background: var(--green); color: var(--bg-crust); }
.btn-save:hover { opacity: 0.85; }
.btn-secondary {
  background: var(--bg-surface0);
  color: var(--subtext0);
}
.btn-secondary:hover { background: var(--bg-surface1); color: var(--text); }
.btn-ai {
  background: rgba(137,180,250,0.12);
  color: var(--blue);
}
.btn-ai:hover { background: rgba(137,180,250,0.22); }
.btn-danger {
  background: rgba(243,139,168,0.12);
  color: var(--red);
}
.btn-danger:hover { background: rgba(243,139,168,0.22); }

/* ===== Analysis Cards ===== */
.analysis-cards { display: flex; flex-direction: column; gap: 14px; }
.analysis-card {
  background: var(--bg-base);
  border: 1px solid var(--bg-surface0);
  border-radius: 10px;
  padding: 18px;
  overflow: hidden;
}
.analysis-card .ac-header {
  font-size: 14px; font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--bg-surface0);
}
.analysis-card .ac-body {
  font-size: 13px; color: var(--subtext0);
  line-height: 1.7;
}
.ac-thesis .ac-header { color: var(--green); }
.ac-argument .ac-header { color: var(--blue); }
.ac-evidence .ac-header { color: var(--peach); }
.ac-strength .ac-header { color: var(--mauve); }
.ac-suggestion .ac-header { color: var(--pink); }

/* ===== Cross-Exam ===== */
.exam-round {
  background: var(--bg-base);
  border: 1px solid var(--bg-surface0);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}
.exam-round .er-label {
  font-size: 11px; color: var(--overlay0); margin-bottom: 6px;
}
.exam-round .er-question {
  font-size: 13px; color: var(--blue); margin-bottom: 8px;
  padding-left: 12px; border-left: 2px solid var(--blue);
}
.exam-round .er-answer {
  font-size: 13px; color: var(--subtext0);
  padding-left: 12px; border-left: 2px solid var(--green);
}

/* ===== Accept Exam Chat ===== */
.chat-container {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column;
  gap: 12px;
}
.chat-bubble {
  max-width: 72%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.55;
}
.chat-bubble.ai {
  align-self: flex-start;
  background: rgba(137,180,250,0.08);
  border: 1px solid rgba(137,180,250,0.12);
  color: var(--blue);
  border-bottom-left-radius: 6px;
}
.chat-bubble.user {
  align-self: flex-end;
  background: rgba(166,227,161,0.08);
  border: 1px solid rgba(166,227,161,0.12);
  color: var(--green);
  border-bottom-right-radius: 6px;
}
.chat-bubble.score {
  align-self: center;
  background: rgba(223,180,96,0.1);
  border: 1px solid rgba(223,180,96,0.15);
  color: var(--gold);
  font-size: 12px;
  font-weight: 600;
}
.chat-input-row {
  display: flex; gap: 8px;
  padding: 12px; border-top: 1px solid var(--bg-surface0);
}
#chat-input {
  flex: 1;
  background: var(--bg-crust);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 10px 14px;
  resize: none;
  outline: none;
  min-height: 40px;
  max-height: 100px;
  font-family: inherit;
}

/* ===== Training ===== */
.training-config {
  display: flex; flex-direction: column; gap: 18px;
}
.training-config h4 {
  font-size: 12px; color: var(--overlay0); font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.05em;
}
/* 训练按钮过渡动画 */
.training-config button {
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.training-config button:active {
  transform: scale(0.96);
  transition: transform 0.08s ease;
}
/* 选中态增强 */
.training-config .btn-ai {
  box-shadow: 0 0 0 1px var(--blue), 0 0 12px rgba(137,180,250,0.15);
}
.training-config .btn-save {
  box-shadow: 0 0 0 1px var(--green), 0 0 12px rgba(166,227,161,0.15);
}
/* 难度按钮选中保持深色底 + 对应颜色发光 */
.training-config button.btn-save[onclick*="trainSetDiff"] {
  background: var(--bg-surface0) !important;
  border-color: var(--green) !important;
}

/* ===== 答题选项预选择动画 ===== */
.train-option {
  padding: 10px 12px; margin-bottom: 6px;
  border-radius: 8px; cursor: pointer;
  font-size: 12px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid transparent;
  position: relative;
  background: var(--bg-mantle);
}
.train-option::before {
  content: ''; position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 0; border-radius: 0 2px 2px 0;
  background: var(--gold);
  transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.train-option:hover {
  background: var(--bg-surface0) !important;
  border-color: var(--bg-surface1);
  padding-left: 22px;
}
.train-option:hover::before {
  width: 3px;
}
.train-option:hover span:first-child {
  color: #ffe082 !important;
}
.train-option:active {
  transform: scale(0.985);
  transition: transform 0.06s ease;
}
.train-option.answered {
  cursor: default;
}
.train-option.answered:hover {
  padding-left: 12px;
  background: inherit !important;
  border-color: transparent;
}
.train-option.answered:hover::before {
  width: 0;
}
/* 涟漪反馈 */
.training-config button::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0.06);
  opacity: 0; transition: opacity 0.3s;
}
.training-config button:hover::after { opacity: 1; }
.training-config button:active::after { opacity: 0; }
.mode-buttons, .diff-buttons {
  display: flex; gap: 6px;
}
.mode-btn, .diff-btn {
  flex: 1; padding: 10px 8px;
  border: 1px solid var(--bg-surface0); border-radius: 8px;
  background: transparent; color: var(--overlay0);
  font-size: 11px; cursor: pointer;
  text-align: center; transition: all 0.12s;
}
.mode-btn:hover, .diff-btn:hover { border-color: var(--bg-surface1); color: var(--text); }
.mode-btn.selected { border-color: var(--blue); color: var(--blue); background: rgba(137,180,250,0.06); }
.diff-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(223,180,96,0.06); }
#quiz-area {
  flex: 1;
  display: flex; flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}
.quiz-progress {
  font-size: 12px; color: var(--overlay0);
}
.quiz-question {
  font-size: 15px; color: var(--text);
  font-weight: 500;
  padding: 16px;
  background: var(--bg-base);
  border-radius: 10px;
  border: 1px solid var(--bg-surface0);
}
.quiz-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.quiz-option {
  padding: 14px 16px;
  background: var(--bg-base);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  color: var(--subtext0);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  transition: all 0.12s;
}
.quiz-option:hover { border-color: var(--bg-surface1); background: var(--bg-surface0); }
.quiz-option.correct { border-color: var(--green); background: rgba(166,227,161,0.08); color: var(--green); }
.quiz-option.wrong { border-color: var(--red); background: rgba(243,139,168,0.08); color: var(--red); }
.quiz-option.disabled { pointer-events: none; opacity: 0.6; }
.quiz-feedback {
  padding: 14px;
  background: var(--bg-base);
  border-radius: 8px;
  border: 1px solid var(--bg-surface0);
  font-size: 12px; color: var(--subtext0);
  line-height: 1.6;
}
.quiz-feedback .qf-label {
  font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.quiz-actions {
  display: flex; gap: 8px;
  justify-content: center;
}

/* ===== Notes (Fixed Search) ===== */
.notes-search {
  margin-bottom: 10px;
}
.notes-search input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-crust);
  border: 1px solid var(--bg-surface0);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.note-card {
  background: var(--bg-base);
  border: 1px solid var(--bg-surface0);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  transition: all 0.12s;
}
.note-card:hover { border-color: var(--bg-surface1); }
.note-card .note-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.note-color-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.note-card .note-text {
  font-size: 12px; color: var(--subtext0);
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.note-card .note-actions {
  display: flex; gap: 6px;
  margin-top: 8px; justify-content: flex-end;
}
.note-card .note-actions button {
  padding: 3px 8px; font-size: 10px;
  background: transparent; border: none;
  color: var(--overlay0); cursor: pointer;
  border-radius: 4px;
}
.note-card .note-actions button:hover { color: var(--text); background: var(--bg-surface0); }
.note-input-area {
  display: flex; flex-direction: column; gap: 8px;
  padding-top: 8px; border-top: 1px solid var(--bg-surface0);
}
.note-colors {
  display: flex; gap: 6px;
}
.note-color-btn {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
}
.note-color-btn.selected { border-color: var(--text); }
#note-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-crust);
  border: 1px solid var(--bg-surface0);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  resize: vertical;
  min-height: 60px;
  outline: none;
  font-family: inherit;
}

/* ===== AI Loading ===== */
.ai-loading {
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 12px;
  color: var(--blue);
  font-size: 12px;
  animation: pulse 1.5s infinite;
}
.ai-loading.hidden { display: none; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--bg-surface0);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Right Panel ===== */
#right-panel {
  width: var(--right-panel-w);
  background: var(--bg-base);
  border-left: 1px solid var(--bg-surface0);
  display: flex; flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  position: absolute; right: var(--nav-w); top: 0; bottom: 28px;
  z-index: 0;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
#right-panel.open { transform: translateX(0); }
.rp-header {
  padding: 12px 16px;
  font-size: 13px; font-weight: 600;
  border-bottom: 1px solid var(--bg-surface0);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.rp-body {
  flex: 1; overflow-y: auto; padding: 12px;
}

/* ===== Right Navigation ===== */

/* ===== Page Transition Animation (在两个页面之间统一) ===== */
.page-transition {
  position: fixed; inset: 0; z-index: 10000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
}
.page-transition.active {
  pointer-events: all;
  animation: transitionIn 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
.page-transition .pt-bg {
  position: absolute; inset: 0;
  background: #0a0a14;
  transform: scaleY(0);
  transform-origin: top;
}
.page-transition.active .pt-bg {
  animation: scaleDown 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
.page-transition .pt-content {
  position: relative; z-index: 1;
  text-align: center; opacity: 0;
  transform: translateY(20px);
}
.page-transition.active .pt-content {
  animation: fadeUp 0.5s 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.page-transition .pt-icon {
  font-size: 2.5rem; margin-bottom: 16px;
  display: inline-block;
  animation: starSpin 0.6s 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
.page-transition .pt-text {
  font-size: 1rem; color: #dfb460; font-weight: 600;
  letter-spacing: 0.02em;
}
.page-transition .pt-load {
  margin-top: 20px; width: 120px; height: 3px;
  background: rgba(223, 180, 96, 0.1);
  border-radius: 2px; overflow: hidden;
}
.page-transition .pt-load::after {
  content: ''; display: block;
  width: 30%; height: 100%;
  background: #dfb460; border-radius: 2px;
  animation: loadSweep 1s 0.5s infinite;
}
@keyframes transitionIn {
  0%{opacity:1} 85%{opacity:1} 100%{opacity:0}
}
@keyframes scaleDown {
  0%{transform:scaleY(0)} 100%{transform:scaleY(1)}
}
@keyframes fadeUp {
  0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)}
}
@keyframes starSpin {
  0%{transform:rotate(-30deg) scale(0);opacity:0} 100%{transform:rotate(0deg) scale(1);opacity:1}
}
@keyframes loadSweep {
  0%{transform:translateX(-100%)} 100%{transform:translateX(400%)}
}

/* ===== Entrance Animation — ✦ 锚点 curtain 揭开 ===== */
.app-entrance {
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  animation: aeFadeAway 0.4s 1.8s forwards;
  background: #0a0a14;
}
/* 上半 curtain — 从 ✦ 线向上滑开 */
.app-entrance .ae-curtain-t {
  position: absolute; top: 0; left: 0; right: 0;
  height: 50%; background: #0a0a14;
  animation: aeCurtainUp 0.9s 0.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
/* 下半 curtain — 从 ✦ 线向下滑开 */
.app-entrance .ae-curtain-b {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 50%; background: #0a0a14;
  animation: aeCurtainDown 0.9s 0.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
/* ✦ 锚点 — 与介绍页衔接的同一个 ✦ */
.app-entrance .ae-icon {
  position: absolute; z-index: 3;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 2.6rem; color: #dfb460;
  text-shadow: 0 0 12px rgba(223,180,96,0.4);
  opacity: 1;
  animation: aePinFade 0.6s 1.0s ease-out forwards;
}
/* ✦ 光晕脉冲 */
.app-entrance .ae-icon-pulse {
  position: absolute; z-index: 2;
  top: 50%; left: 50%;

  background: radial-gradient(circle, rgba(223,180,96,0.15) 0%, transparent 70%);
  animation: aePulseExpand 0.9s 0.5s ease-out forwards;
}
/* 分裂线 — ✦ 两侧的水平线 */
.app-entrance .ae-split-line {
  position: absolute; z-index: 2;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(223,180,96,0.5) 30%, rgba(223,180,96,0.8) 48%, transparent 48%),
              linear-gradient(90deg, transparent 52%, rgba(223,180,96,0.8) 52%, rgba(223,180,96,0.5) 70%, transparent 100%);
  animation: aeSplitGlow 1.2s 0.4s ease-out forwards;
}
/* 标题 — curtain 分开后浮现 */
.app-entrance .ae-text {

<script>
// ======================== 全局存储 ========================
const STORE = {
  currentDebate: null, debates: [], pinnedItems: [], activeLeftPanel: 'project', activeRightPanel: null, rightPanelOpen: false,
  activeCentreView: 'empty', activeSpeechTab: 'pro', activeStructureSide: 'pro', activeFormat: null,
  customFormats: [], notes: [], projectFilter: '',
  training: { mode: 'technique', difficulty: 'medium', questions: [], currentQ: 0, score: 0, correct: 0, answered: false, sessionActive: false, sessions: [] },
  framework: { pro: { nodes: [] }, con: { nodes: [] } },
  refDoc: { rows: [] },
  fwData: { nodes: [], nextId: 1 }, fwSide: 'pro',
  structData: { pro: [], con: [] },
  importedFiles: []
};
function loadStore() { try { let d = JSON.parse(localStorage.getItem('stardebate_data')||'{}'); STORE.notes = d.notes||[]; STORE.customFormats = d.customFormats||[]; STORE.debates = d.debates||[]; STORE.pinnedItems = d.pinnedItems||[]; STORE.framework = d.framework||{pro:{nodes:[]},con:{nodes:[]}}; STORE.refDoc = d.refDoc||{rows:[]}; STORE.fwData = d.fwData||{nodes:[],nextId:1}; if(!Array.isArray(STORE.fwData.nodes)) STORE.fwData.nodes=[]; if(!STORE.fwData.nextId||STORE.fwData.nextId<1) STORE.fwData.nextId=1; STORE.fwData.nodes = STORE.fwData.nodes.filter(n=>n&&n.id); STORE.structData = d.structData||{pro:[],con:[]}; if(d.trainSessions) STORE.training.sessions = d.trainSessions; } catch(e) {} }
function saveStore() { localStorage.setItem('stardebate_data', JSON.stringify({ notes:STORE.notes, customFormats:STORE.customFormats, debates:STORE.debates, pinnedItems:STORE.pinnedItems, framework:STORE.framework, refDoc:STORE.refDoc, fwData:STORE.fwData, structData:STORE.structData, trainSessions:STORE.training.sessions })); }
loadStore();

let speechContent = { pro: '', con: '' };
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
function fwEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function setStatus(text, isLoading=false) { $('#status-text').textContent=text; $('#status-loading').classList.toggle('hidden',!isLoading); }
function navigateToLanding() {
  let overlay = document.getElementById('pageTransition');
  if (!overlay) { window.location.href = 'index.html'; return; }
  // 设置文字
  let label = document.getElementById('ptLabel');
  if (label) label.textContent = '返回介绍页...';
  // 保存应用状态
  saveStore();
  overlay.classList.add('active');
  setTimeout(() => { window.location.href = 'index.html'; }, 1000);
}
function setCentreHeader(title, showBack=false, backAction=null) { const h=$('#centre-header'); if(showBack) { h.innerHTML=`<button class="back-btn" id="centre-back">←</button><span>${title}</span>`; document.getElementById('centre-back').onclick=()=>{ if(backAction) backAction(); else backToEmpty(); }; } else h.innerHTML=`<span>${title}</span>`; }
function setCentreBody(html) { var el=$('#centre-body'); el.innerHTML=html; el.classList.remove('view-crossfade'); void el.offsetWidth; el.classList.add('view-crossfade'); }
function backToEmpty() { STORE.activeCentreView='empty'; setCentreHeader('StarDebate ★ 辩之星<span class="demo-badge" style="margin-left:8px;">体验版</span>'); setCentreBody(renderEmptyState()); }
function renderEmptyState() { return `<div class="empty-state"><div class="es-icon">✦</div><div class="es-title">StarDebate ★ 辩之星<span class="demo-badge" style="margin-left:8px;">体验版</span></div><div class="es-desc">与你一起专业备赛「AI专业备赛助手」</div><div style="margin-top:8px;display:flex;gap:8px;"><button class="btn btn-save" onclick="actionNewDebate()">🆕 新建辩论</button><button class="btn btn-ai" onclick="actionSpeech()">📝 编辑一辩稿</button></div><div class="download-notice" style="margin-top:20px;padding:16px;background:rgba(203,166,247,0.05);border-radius:12px;"><div class="dn-title">🤖 AI 功能需下载桌面版</div><div class="dn-desc">AI写稿、分析、模拟质询等需要完整版</div><a href="javascript:void(0)" class="dn-btn" style="display:inline-block;margin-top:10px;padding:8px 20px;background:#dfb460;color:#0a0a14;border-radius:6px;text-decoration:none;cursor:pointer;transition:all 0.15s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'" onclick="navigateToLanding()">📥 了解桌面版</a></div></div>`; }

// ======================== 核心功能：打开辩论 ========================
function openDebate(id) {
  const debate = STORE.debates.find(d=>d.id===id);
  if(!debate) return;
  STORE.currentDebate = id;
  speechContent.pro = debate.speeches?.pro || '';
  speechContent.con = debate.speeches?.con || '';
  saveStore();
  renderLeftPanel();
  STORE.activeCentreView = 'detail';
  setCentreHeader(`${debate.pro} vs ${debate.con}`, true);
  setCentreBody(renderDebateDetail(debate));
  setStatus(`已打开辩论: ${debate.pro} vs ${debate.con}`);
  setTimeout(()=>setStatus('就绪'),1500);
}
function renderDebateDetail(debate) {
  if(!debate) return '<div>辩论不存在</div>';
  return `<div class="analysis-cards"><div class="analysis-card" style="border-left:3px solid var(--green);"><div class="ac-header">🟢 正方：${debate.pro}</div><div class="ac-body"><div>立场：${debate.pro_args}</div><div>一辩稿：${(debate.speeches?.pro||'').length}字</div><div style="margin-top:8px;"><button class="small-btn primary" onclick="speechContent={pro:debate.speeches?.pro||'',con:debate.speeches?.con||''};switchSpeechTab('pro');actionSpeech()">📝 编辑一辩稿</button></div></div></div><div class="analysis-card" style="border-left:3px solid var(--red);"><div class="ac-header">🔴 反方：${debate.con}</div><div class="ac-body"><div>立场：${debate.con_args}</div><div>一辩稿：${(debate.speeches?.con||'').length}字</div><div style="margin-top:8px;"><button class="small-btn primary" onclick="speechContent={pro:debate.speeches?.pro||'',con:debate.speeches?.con||''};switchSpeechTab('con');actionSpeech()">📝 编辑一辩稿</button></div></div></div></div><div style="display:flex;gap:8px;margin-top:16px;"><button class="btn btn-ai" onclick="showDesktopRequired('模拟质询')">⚡ 模拟质询</button><button class="btn btn-ai" onclick="showDesktopRequired('模拟接质')">🛡️ 模拟接质</button></div>`;
}

// ======================== 导入项目文件（只读查看） ========================
function importProjectFile() {
  let input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.multiple = true;
  input.onchange = function(e) {
    let files = Array.from(e.target.files);
    if (!files.length) return;
    setStatus('正在导入...');
    let processed = 0;
    files.forEach(f => {
      let reader = new FileReader();
      reader.onload = function(ev) {
        processed++;
        try {
          let data = JSON.parse(ev.target.result);
          // Detect file type
          let ftype = 'other';
          if (f.name.match(/debate_\d{8}_\d{6}\.json/)) ftype = 'debate';
          else if (f.name.includes('一辩稿') && f.name.endsWith('.json')) ftype = 'speech';
          else if (f.name.includes('资料稿') && f.name.endsWith('.json')) ftype = 'refdoc';
          else if (f.name.includes('分析') && f.name.endsWith('.json')) ftype = 'analysis';
          else if (f.name.startsWith('train_') && f.name.endsWith('.json')) ftype = 'training';

          let entry = {
            id: 'imp_' + Date.now() + '_' + processed,
            fname: f.name, ftype: ftype, readonly: true,
            data: data
          };

          // Deduce side for speech files
          if (ftype === 'speech') {
            entry.side = f.name.includes('正方') ? 'pro' : 'con';
            entry.sideLabel = entry.side === 'pro' ? '正方' : '反方';
          }

          if (!STORE.importedFiles) STORE.importedFiles = [];
          STORE.importedFiles.push(entry);
        } catch(e) {
          if (!STORE.importedFiles) STORE.importedFiles = [];
          STORE.importedFiles.push({
            id: 'imp_err_' + Date.now() + '_' + processed,
            fname: f.name, ftype: 'error', readonly: true,
            error: e.message
          });
        }
        if (processed >= files.length) {
          renderLeftPanel();
          setStatus('已导入 ' + files.length + ' 个文件（只读）');
          setTimeout(function(){setStatus('就绪')}, 2500);
        }
      };
      reader.readAsText(f);
    });
  };
  input.click();
}

function clearImported() {
  if (!confirm('清除全部导入文件？')) return;
  STORE.importedFiles = [];
  renderLeftPanel();
  setStatus('已清除导入文件');
  setTimeout(function(){setStatus('就绪')}, 1500);
}

function openImportedFileByIdx(i) { var imp = (STORE.importedFiles||[])[i]; if(imp) openImportedFile(imp); }
function openImportedFile(entry) {
  if (!entry) return;
  let ftype = entry.ftype || 'other';
  if (ftype === 'debate') {
    let d = entry.data || {};
    let html = '<div class="analysis-cards">';
    html += '<div class="analysis-card" style="border-left:3px solid var(--green);"><div class="ac-header">' + '🟢 正方：' + fwEsc(d.pro||'—') + '</div><div class="ac-body"><div>立场：' + fwEsc(d.pro_args||'—') + '</div></div></div>';
    html += '<div class="analysis-card" style="border-left:3px solid var(--red);"><div class="ac-header">' + '🔴 反方：' + fwEsc(d.con||'—') + '</div><div class="ac-body"><div>立场：' + fwEsc(d.con_args||'—') + '</div></div></div>';
    html += '</div>';
    STORE.activeCentreView = 'import-debate';
    setCentreHeader('📋 ' + fwEsc(entry.fname) + ' <span class="demo-badge" style="margin-left:4px;">只读</span>', true, backToEmpty);
    setCentreBody(html);
  } else if (ftype === 'speech') {
    let d = entry.data || {};
    let content = d.content || '';
    let sideLabel = entry.sideLabel || '';
    let fw = d.framework || null;
    let fwNodes = (fw && fw.nodes) ? fw.nodes : [];
    let hasFramework = fwNodes.length > 0;
    speechContent = { pro: '', con: '' };
    speechContent[entry.side || 'pro'] = content;
    STORE.activeCentreView = 'import-speech';
    setCentreHeader('📝 ' + sideLabel + '一辩稿 <span class="demo-badge" style="margin-left:4px;">只读</span>', true, backToEmpty);
    if (hasFramework) {
      // 用原生框架画布展示，节点设为只读
      // 桌面版用"node_type"字段，网页版用"type"，做兼容转换
      STORE.fwData = { nodes: fwNodes.map(function(n){
        var nd = {};
        for (var k in n) nd[k] = n[k];
        if (nd.node_type && !nd.type) nd.type = nd.node_type;
        if (!nd.type) nd.type = 'argument';
        // 兼容旧字段名
        if (nd.width && !nd.w) nd.w = nd.width;
        if (nd.height && !nd.h) nd.h = nd.height;
        if (nd.x === undefined) nd.x = 50;
        if (nd.y === undefined) nd.y = 50;
        if (!nd.w) nd.w = 140;
        if (!nd.h) nd.h = 60;
        if (!nd.children) nd.children = [];
        if (!nd.text) nd.text = '';
        return nd;
      }), nextId: (fw && fw.nextId) || 1 };
      // 上下等分：辩稿正文 + 框架画布
      let html = '<div style="display:flex;flex-direction:column;">' +
        '<div style="padding:16px;background:var(--bg-mantle);color:var(--text);font-size:14px;line-height:1.8;font-family:inherit;white-space:pre-wrap;word-break:break-word;">' + fwEsc(content) + '</div>' +
        '<div id="fw-readonly-container" style="position:relative;border-top:1px solid var(--bg-surface0);">' +
          '<div style="font-size:10px;color:var(--overlay0);padding:4px 12px;">🧠 辩论框架 · ' + fwNodes.length + '节点 <span class="demo-badge">只读</span></div>' +
          renderFramework() +
        '</div>' +
      '</div>' +
      '<div style="font-size:10px;color:var(--overlay0);padding:4px 12px;flex:none;">🔒 只读模式 · ' + content.length + '字</div>';
      setCentreBody(html);
      setTimeout(function(){
        fwAutoLayout(7);  // 导入只读模式增加2行冗余
        setTimeout(function(){
          refreshFwCanvas();
          var maxBottom = 200;
          document.querySelectorAll('.fw-node-el').forEach(function(el){
            var b = (parseInt(el.style.top)||0) + (parseInt(el.style.height)||0);
            if (b > maxBottom) maxBottom = b;
          });
          var wrap = document.getElementById('fw-canvas-wrap');
          var container = document.getElementById('fw-readonly-container');
          if (wrap) {
            wrap.style.overflow = 'visible';
            wrap.style.flex = 'none';
            wrap.style.minHeight = (maxBottom + 40) + 'px';
          }
          if (container) {
            container.style.minHeight = (maxBottom + 60) + 'px';
          }
          // 容器尺寸变更后重绘连接线以匹配新 viewBox
          fwDrawConnections();
          // 给所有节点加只读样式，禁用交互
          document.querySelectorAll('.fw-node-el').forEach(function(el){
            el.style.cursor = 'default';
            el.style.pointerEvents = 'none';
          });
          // 隐藏工具栏按钮
          let tb = document.querySelector('.fw-toolbar');
          if (tb) tb.style.display = 'none';
        }, 30);
      }, 50);
    } else {
      let html = '<div style="padding:12px;">' +
        '<div style="background:var(--bg-mantle);color:var(--text);border:1px solid var(--bg-surface0);border-radius:8px;padding:16px;font-size:14px;line-height:1.8;font-family:inherit;white-space:pre-wrap;word-break:break-word;">' + fwEsc(content) + '</div>' +
        '<div style="font-size:10px;color:var(--overlay0);">🔒 只读模式 · ' + content.length + '字</div>' +
        '</div>';
      setCentreBody(html);
    }
  } else if (ftype === 'refdoc') {
    let d = entry.data || {};
    let rows = d.rows || [];
    STORE.activeCentreView = 'import-refdoc';
    setCentreHeader('📑 ' + fwEsc(entry.fname) + ' <span class="demo-badge" style="margin-left:4px;">只读</span>', true, backToEmpty);
    setCentreBody(renderRefDocReadOnly(rows));
  } else if (ftype === 'analysis') {
    let d = entry.data || {};
    let text = d.analysis || '';
    let side = entry.fname.includes('正方') ? '正方' : '反方';
    STORE.activeCentreView = 'import-analysis';
    setCentreHeader('🤖 ' + side + 'AI分析 <span class="demo-badge" style="margin-left:4px;">只读</span>', true, backToEmpty);
    let html = '<div style="padding:12px;">' +
      '<div style="background:var(--bg-mantle);border:1px solid var(--bg-surface0);border-radius:8px;padding:16px;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:calc(100vh - 140px);overflow-y:auto;">' + fwEsc(text) + '</div>' +
      '<div style="font-size:10px;color:var(--overlay0);margin-top:4px;">🔒 只读模式 · ' + text.length + '字</div>' +
      '</div>';
    setCentreBody(html);
  } else if (ftype === 'training') {
    let d = entry.data || {};
    STORE.activeCentreView = 'import-training';
    setCentreHeader('🎯 训练记录 <span class="demo-badge" style="margin-left:4px;">只读</span>', true, backToEmpty);
    let html = '<div style="padding:12px;overflow-y:auto;max-height:calc(100vh - 100px);">' +
      '<div style="margin-bottom:8px;font-size:12px;"><span>模式：' + (d.mode||'—') + ' · 难度：' + (d.difficulty||'—') + ' · ' + (d.correct_count||0) + '/' + (d.total_questions||0) + '题 · ' + (d.score||0) + '分</span></div>';
    let qs = d.questions || [];
    qs.forEach(function(q, i) {
      html += '<div style="padding:8px;margin-bottom:4px;background:var(--bg-mantle);border-radius:6px;border-left:3px solid ' + (q.is_correct ? 'var(--green)' : 'var(--red)') + ';font-size:11px;">' +
        '<span>' + (q.is_correct ? '✅' : '❌') + ' ' + fwEsc((q.question||'').substring(0, 60)) + '</span>' +
        '<span style="float:right;font-size:10px;color:var(--overlay0);">' + (q.user_answer||'-') + '→' + (q.is_correct ? '✓' : '✗') + '</span>' +
        '</div>';
    });
    html += '<div style="font-size:10px;color:var(--overlay0);margin-top:4px;">🔒 只读模式 · ' + qs.length + '题</div></div>';
    setCentreBody(html);
  }
}

function renderImportedFramework(nodes) {
  if (!nodes || !nodes.length) return '<div style="font-size:10px;color:var(--overlay0);text-align:center;padding:20px;">（无框架数据）</div>';
  return nodes.map(nd => {
    let t = (FW_TYPES[nd.type] || FW_TYPES.argument);
    return '<div style="margin-bottom:6px;padding:6px 8px;background:rgba(0,0,0,0.15);border-radius:4px;border-left:3px solid ' + t[1] + ';">' +
      '<div style="font-size:9px;color:' + t[1] + ';font-weight:600;">' + t[0] + '</div>' +
      '<div style="font-size:10px;color:var(--subtext0);margin-top:2px;">' + fwEsc((nd.text||'未命名').substring(0,60)) + '</div>' +
      (nd.children&&nd.children.length?'<div style="font-size:9px;color:var(--overlay0);margin-top:2px;">↳ ' + nd.children.length + '子节点</div>':'') +
      '</div>';
  }).join('');
}

function renderRefDocReadOnly(rows) {
  let trs = rows.map(function(r, i) {
    let a = typeof r === 'object' ? (r.argument || '') : (r[0] || '');
    let c = typeof r === 'object' ? (r.content || '') : (r[1] || '');
    let s = typeof r === 'object' ? (r.source || '') : (r[2] || '');
    var bg = i % 2 === 0 ? 'var(--bg-base)' : 'var(--bg-mantle)';
    return '<tr style=\"background:' + bg + ';\">' +
      '<td style=\"padding:8px 12px;font-size:12px;border-bottom:1px solid var(--bg-surface0);\">' + fwEsc(a || '—') + '</td>' +
      '<td style=\"padding:8px 12px;font-size:12px;border-bottom:1px solid var(--bg-surface0);\">' + fwEsc(c || '—') + '</td>' +
      '<td style=\"padding:8px 12px;font-size:12px;border-bottom:1px solid var(--bg-surface0);color:var(--subtext0);\">' + fwEsc(s || '—') + '</td>' +
      '</tr>';
  }).join('');
  if (!trs) trs = '<tr><td colspan="3" style="text-align:center;color:var(--overlay0);padding:32px;">（无数据）</td></tr>';
  return '<div class="ref-table-wrap">' +
    '<table>' +
    '<thead><tr><th style="width:25%;">论证观点</th><th style="width:40%;">论证内容</th><th style="width:35%;">资料来源</th></tr></thead>' +
    '<tbody>' + trs + '</tbody>' +
    '</table></div>' +
    '<div style="font-size:10px;color:var(--overlay0);padding:8px 12px;">🔒 只读模式 · ' + rows.length + '条记录</div>';
}

// ======================== 左侧面板 & 其余基础函数 ========================
function renderLeftPanel() {
  const lp = $('#lp-content');
  if(STORE.activeLeftPanel==='project') lp.innerHTML = renderProjectTree();
  else if(STORE.activeLeftPanel==='structure') lp.innerHTML = renderStructureTree();
  else lp.innerHTML = renderFormatBrowser();

}
function renderProjectTree() {
  let filter = (STORE.projectFilter||'').toLowerCase();

  // Filter
  let filtered = filter ? debates.filter(d=>d.pro.toLowerCase().includes(filter)||d.con.toLowerCase().includes(filter)) : debates;
  // Sort: pinned first, then by id
  filtered.sort((a,b)=>{ let aPin=STORE.pinnedItems.includes(a.id)?0:1, bPin=STORE.pinnedItems.includes(b.id)?0:1; return aPin!==bPin?aPin-bPin:a.id>b.id?1:-1; });

  let html = '';
  // Header with search
  html += `<div class="panel-header">📁 项目浏览器</div>`;
  html += `<div class="notes-search" style="margin:8px;"><input id="project-filter" placeholder="搜索项目名称..." value="${fwEsc(STORE.projectFilter||'')}" oninput="STORE.projectFilter=this.value;renderLeftPanel()"></div>`;
  html += '<div class="panel-body">';

  let imported = STORE.importedFiles || [];
  if (!debates.length && !imported.length) {
    html += '<div style="padding:20px;text-align:center;color:var(--overlay0);font-size:12px;">📂 暂无辩论项目<br><button class="btn btn-save" style="margin-top:12px;" onclick="actionNewDebate()">🆕 新建辩论</button></div>';

    html += '<div style="padding:20px;text-align:center;color:var(--overlay0);font-size:12px;">🔍 无匹配项目</div>';
  } else {
    // Pinned section
    let pinnedList = filtered.filter(d=>STORE.pinnedItems.includes(d.id));
    let unpinnedList = filtered.filter(d=>!STORE.pinnedItems.includes(d.id));
    let total = debates.length;

    // Stats header
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 12px;font-size:10px;color:var(--overlay0);margin-bottom:4px;">`;
    html += `<span>📁 项目 (${total}个${filter?'，匹配'+filtered.length+'个':''})</span>`;
    html += `<span style="display:flex;gap:8px;">
      <span onclick="importProjectFile()" style="cursor:pointer;color:var(--gold);" title="导入项目文件(只读)">📥</span>
      <span onclick="actionNewDebate()" style="cursor:pointer;color:var(--blue);" title="新建辩论">➕</span>
    </span>`;
    html += `</div>`;

    if (pinnedList.length) {
      html += `<div class="tree-item" style="color:var(--gold);font-weight:600;font-size:11px;padding:4px 12px;">📌 置顶 (${pinnedList.length})</div>`;
      pinnedList.forEach(d=>html+=renderDebateItem(d));
    }
    if (unpinnedList.length) {
      if (pinnedList.length) html += `<div style="margin:2px 0;"></div>`;
      unpinnedList.forEach(d=>html+=renderDebateItem(d));
    }
  }
  // Imported files section
    if (imported.length && (!filter || filter.length)) {
      if (debates.length) html += '<div style="border-top:1px solid var(--bg-surface0);margin:6px 0;"></div>';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 12px;font-size:10px;color:var(--overlay0);">';
      html += '<span>📥 导入文件 (' + imported.length + '个) <span class="demo-badge" style="font-size:8px;">只读</span></span>';
      html += '<span onclick="clearImported()" style="cursor:pointer;color:var(--red);font-size:9px;" title="清除全部导入">🗑</span>';
      html += '</div>';
      imported.forEach(function(imp) {
        let icon = '📄';
        let label = imp.fname;
        let typeLabel = '';
        let color = 'var(--overlay0)';
        if (imp.ftype === 'debate') { icon = '📋'; color = 'var(--gold)'; typeLabel = '辩论'; }
        else if (imp.ftype === 'speech') { icon = '📝'; color = imp.side === 'pro' ? 'var(--green)' : 'var(--red)'; typeLabel = (imp.sideLabel||'') + '一辩稿'; }
        else if (imp.ftype === 'refdoc') { icon = '📑'; color = 'var(--blue)'; typeLabel = '资料稿'; }
        else if (imp.ftype === 'analysis') { icon = '🤖'; color = 'var(--mauve)'; typeLabel = 'AI分析'; }
        else if (imp.ftype === 'training') { icon = '🎯'; color = 'var(--peach)'; typeLabel = '训练'; }
        html += '<div class="tree-item" onclick="openImportedFileByIdx('+imported.indexOf(imp)+')" style="font-size:11px;padding:6px 12px;cursor:pointer;">' +

  return html;

function renderDebateItem(d) {
  let active = STORE.currentDebate===d.id?' active':'';
  let isPinned = STORE.pinnedItems.includes(d.id);
  let pinIcon = isPinned ? '📌 ' : '';
  let name = `${pinIcon}${fwEsc(d.pro)} vs ${fwEsc(d.con)}`;
  let proLen = d.speeches?.pro?.length || 0;
  let conLen = d.speeches?.con?.length || 0;

  let html = `<div class="tree-item${active}" onclick="openDebate('${d.id}')" oncontextmenu="showTreeContextMenu(event,'${d.id}');return false;" title="${isPinned?'已置顶 · ':''}正方:${proLen}字 反方:${conLen}字">`;
  html += `<span style="color:var(--mauve);">📄</span>`;
  html += `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>`;
  html += `<span style="font-size:9px;color:var(--overlay0);margin-left:4px;">${proLen||0}+${conLen||0}字</span>`;
  html += `<span style="font-size:10px;color:var(--overlay0);margin-left:4px;opacity:0;" class="tree-actions">`;
  html += `<span onclick="event.stopPropagation();togglePinItem('${d.id}')" title="置顶/取消置顶" style="cursor:pointer;">📌</span>`;
  html += `<span onclick="event.stopPropagation();deleteDebate('${d.id}')" title="删除" style="cursor:pointer;">🗑</span>`;
  html += `</span>`;
  html += `</div>`;

  // Sub-items for active debate
  if (STORE.currentDebate===d.id) {
    html += `<div class="tree-item tree-item-indent" onclick="switchSpeechTab('pro');actionSpeech()">🟢 正方一辩稿<span style="margin-left:auto;font-size:10px;color:var(--overlay0);">${proLen||'0'}字</span></div>`;
    html += `<div class="tree-item tree-item-indent" onclick="switchSpeechTab('con');actionSpeech()">🔴 反方一辩稿<span style="margin-left:auto;font-size:10px;color:var(--overlay0);">${conLen||'0'}字</span></div>`;
    html += `<div class="tree-item tree-item-indent" onclick="STORE.activeCentreView='ref-doc';STORE.refViewMode='table';setCentreHeader('📑 资料稿',true);setCentreBody(renderRefDoc());">📊 资料稿<span style="margin-left:auto;font-size:10px;color:var(--overlay0);">${(STORE.refDoc.rows||[]).length}条</span></div>`;
    html += `<div class="tree-item tree-item-indent" onclick="STORE.activeLeftPanel='structure';renderLeftPanel();">🌳 结构树</div>`;
    html += `<div class="tree-item tree-item-indent" onclick="STORE.activeCentreView='framework';setCentreHeader('🧠 辩论框架',true);setCentreBody(renderFramework());setTimeout(refreshFwCanvas,10);">🧠 辩论框架<span style="margin-left:auto;font-size:10px;color:var(--overlay0);">${(STORE.fwData.nodes||[]).length}节点</span></div>`;
  }
  return html;
}

function togglePinItem(id) {
  let idx = STORE.pinnedItems.indexOf(id);
  if (idx>=0) STORE.pinnedItems.splice(idx,1); else STORE.pinnedItems.push(id);
  saveStore(); renderLeftPanel();
  setStatus(idx>=0?'已取消置顶':'已置顶');
  setTimeout(()=>setStatus('就绪'),1500);
}

// ======================== 右键菜单（对齐桌面版 _on_tree_context_menu） ========================
function showTreeContextMenu(e, id) {
  e.preventDefault(); e.stopPropagation();
  hideTreeContextMenu();
  let debate = STORE.debates.find(d=>d.id===id);
  if (!debate) return;
  let isPinned = STORE.pinnedItems.includes(id);

  let menu = document.createElement('div');
  menu.className = 'tree-context-menu';
  menu.id = 'tree-context-menu';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  // Keep menu within viewport
  setTimeout(()=>{
    let r = menu.getBoundingClientRect();
    if (r.right > window.innerWidth) menu.style.left = (e.clientX - r.width) + 'px';
    if (r.bottom > window.innerHeight) menu.style.top = (e.clientY - r.height) + 'px';
  },0);

  menu.innerHTML = `
    <div class="cm-item" onclick="togglePinItem('${id}');hideTreeContextMenu()">${isPinned?'📌 取消置顶':'📌 置顶'}</div>
    <div class="cm-divider"></div>
    <div class="cm-item" onclick="openDebate('${id}');hideTreeContextMenu()">📖 打开辩论详情</div>
    <div class="cm-item" onclick="switchSpeechTab('pro');actionSpeech();hideTreeContextMenu()">🟢 编辑正方一辩稿</div>
    <div class="cm-item" onclick="switchSpeechTab('con');actionSpeech();hideTreeContextMenu()">🔴 编辑反方一辩稿</div>
    <div class="cm-divider"></div>
    <div class="cm-item danger" onclick="deleteDebate('${id}');hideTreeContextMenu()">🗑 删除项目</div>
  `;
  document.body.appendChild(menu);
  // Close on click outside
  setTimeout(()=>document.addEventListener('click', hideTreeContextMenu, {once:true}), 0);
}

function hideTreeContextMenu() {
  let m = document.getElementById('tree-context-menu');
  if (m) m.remove();
}
function deleteDebate(id) { if(!confirm('删除辩论？'))return; STORE.debates=STORE.debates.filter(d=>d.id!==id); if(STORE.currentDebate===id) STORE.currentDebate=STORE.debates[0]?.id||null; saveStore(); renderLeftPanel(); if(!STORE.currentDebate) backToEmpty(); else openDebate(STORE.currentDebate); setStatus('辩论已删除'); }

  </div>

    <button class="${side==='pro'?'active':''}" onclick="switchStructSide('pro')">🟦 正方</button>

  </div>

function renderStructNodes(nodes, side, depth=0) {
  if (!nodes || !nodes.length) return '<div class="struct-empty">（暂无结构，点击下方 + 新增章节 添加）</div>';
  return nodes.map((nd, i) => renderStructNode(nd, side, depth, i)).join('');
}

function renderStructNode(nd, side, depth, idx) {
  let name = fwEsc(nd.name || '未命名章节');
  let kwCount = (nd.keywords || []).length;
  let hasNote = !!(nd.note);
  let hasRef = !!(nd.reference);
  let hasChildren = !!(nd.children && nd.children.length);
  let pad = depth * 16;
  let icons = [];
  if (kwCount) icons.push(`<span class="st-icon st-kw">🔑${kwCount}</span>`);
  if (hasNote) icons.push(`<span class="st-icon st-note">📝</span>`);
  if (hasRef) icons.push(`<span class="st-icon st-ref">📎</span>`);

  let cls = hasChildren ? 'st-section has-children' : 'st-section';
  let toggleBtn = hasChildren ? `<span class="st-toggle" id="st-toggle-${idx}" onclick="event.stopPropagation();structToggleChildren(${idx})">▶</span>` : `<span class="st-toggle-placeholder"></span>`;

  let html = `<div class="st-node" style="padding-left:${pad}px;">
    <div class="${cls}" oncontextmenu="structContextMenu(event,${JSON.stringify(idx).replace(/"/g,'&quot;')},'${side}');return false;">
      ${toggleBtn}
      <span class="st-name" style="color:#89b4fa">📌 ${name}</span>
      <span class="st-icons">${icons.join(' ')}</span>
    </div>
    <div class="st-children" id="st-children-${idx}">
      ${hasRef ? `<div class="st-sub st-ref-sub">📎 <span>${fwEsc((nd.reference||'').substring(0,40))}${(nd.reference||'').length>40?'…':''}</span></div>` : ''}
      ${hasNote ? `<div class="st-sub st-note-sub">📝 <span>${fwEsc((nd.note||'').substring(0,40))}${(nd.note||'').length>40?'…':''}</span></div>` : ''}
      ${(nd.keywords||[]).map((kw,kwi)=>{
        let w = typeof kw==='string'?kw:kw.word;
        let n = (typeof kw==='object'&&kw.note)?' 📝':'';
        let r = (typeof kw==='object'&&kw.reference)?' 📎':'';
        return `<div class="st-sub st-kw-sub" oncontextmenu="structKwContextMenu(event,${idx},${kwi},'${side}');return false;">🔑 ${fwEsc(w)}${n}${r}</div>`;
      }).join('')}
      ${hasChildren ? renderStructNodes(nd.children, side, depth+1) : ''}
    </div>
  </div>`;
  return html;
}

// ─── Side switching ───
function switchStructSide(side) {
  STORE.activeStructureSide = side;
  renderLeftPanel();
}

function structExpandAll() {
  document.querySelectorAll('.st-children').forEach(el => el.classList.add('open'));
  document.querySelectorAll('.st-toggle').forEach(el => el.textContent = '▼');
}
function structCollapseAll() {
  document.querySelectorAll('.st-children').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.st-toggle').forEach(el => el.textContent = '▶');
}
function structToggleChildren(idx) {
  let children = document.getElementById('st-children-'+idx);
  let toggle = document.getElementById('st-toggle-'+idx);
  if (children && toggle) {
    children.classList.toggle('open');
    toggle.textContent = children.classList.contains('open') ? '▼' : '▶';
  }
}

// ─── Helper to get node by path ───
function structGetNode(side, pathArr) {
  let data = (STORE.structData||{})[side] || [];
  let cur = data;
  let node = null;
  for (let i = 0; i < pathArr.length; i++) {
    let idx = pathArr[i];
    if (i === pathArr.length - 1) {
      node = cur[idx];
    } else {
      cur = (cur[idx]&&cur[idx].children) || [];
    }
  }
  return node;
}

function structSetNode(side, pathArr, newNode) {
  let data = (STORE.structData||{})[side] || [];
  let cur = data;
  for (let i = 0; i < pathArr.length - 1; i++) {
    cur = cur[pathArr[i]].children || [];
  }
  if (newNode === null) {
    cur.splice(pathArr[pathArr.length-1], 1);
  } else {
    cur[pathArr[pathArr.length-1]] = newNode;
  }
  if (!STORE.structData) STORE.structData = {pro:[],con:[]};
  STORE.structData[side] = data;
}

// ─── CRUD: Add root section ───
function structAddRootSection(side) {
  let name = prompt('请输入新章节名称：');
  if (!name || !name.trim()) return;
  let node = { name: name.trim(), keywords: [], children: [], note: '', reference: '' };
  if (!STORE.structData) STORE.structData = {pro:[],con:[]};
  STORE.structData[side].push(node);
  saveStore(); renderLeftPanel();
  setStatus('已添加章节'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Add child section ───
function structAddChildSection(side, pathArr) {
  let parent = structGetNode(side, pathArr);
  if (!parent) return;
  let name = prompt('请输入子章节名称：');
  if (!name || !name.trim()) return;
  if (!parent.children) parent.children = [];
  parent.children.push({ name: name.trim(), keywords: [], children: [], note: '', reference: '' });
  saveStore(); renderLeftPanel();
  setStatus('已添加子章节'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Rename section ───
function structRenameSection(side, pathArr) {
  let node = structGetNode(side, pathArr);
  if (!node) return;
  let name = prompt('重命名章节：', node.name||'');
  if (!name || !name.trim()) return;
  node.name = name.trim();
  saveStore(); renderLeftPanel();
  setStatus('已重命名'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Delete section (recursive) ───
function structDeleteSection(side, pathArr) {
  let node = structGetNode(side, pathArr);
  if (!node) return;
  let childCount = node.children ? node.children.length : 0;
  let msg = childCount ? `删除"${node.name}"及其${childCount}个子章节？` : `确定删除"${node.name}"？`;
  if (!confirm(msg)) return;
  structSetNode(side, pathArr, null);
  saveStore(); renderLeftPanel();
  setStatus('已删除'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Add keyword ───
function structAddKeyword(side, pathArr) {
  let node = structGetNode(side, pathArr);
  if (!node) return;
  let text = prompt('输入关键词（多个用空格或逗号分隔）：');
  if (!text || !text.trim()) return;
  if (!node.keywords) node.keywords = [];
  let words = text.split(/[,\s]+/).filter(w=>w.trim());
  words.forEach(w => {
    if (!node.keywords.some(k=>(typeof k==='string'?k:k.word)===w)) {
      node.keywords.push({ word: w, note: '', reference: '' });
    }
  });
  saveStore(); renderLeftPanel();
  setStatus('已添加关键词'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Delete keyword ───
function structDeleteKeyword(side, pathArr, kwIdx) {
  let node = structGetNode(side, pathArr);
  if (!node || !node.keywords) return;
  let kw = node.keywords[kwIdx];
  let w = typeof kw==='string'?kw:kw.word;
  if (!confirm(`删除关键词"${w}"？`)) return;
  node.keywords.splice(kwIdx, 1);
  saveStore(); renderLeftPanel();
  setStatus('已删除关键词'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Edit keyword note ───
function structEditKwNote(side, pathArr, kwIdx) {
  let node = structGetNode(side, pathArr);
  if (!node || !node.keywords) return;
  let kw = node.keywords[kwIdx];
  if (typeof kw==='string') { kw = { word: kw, note: '', reference: '' }; node.keywords[kwIdx] = kw; }
  let text = prompt('编辑关键词注释：', kw.note||'');
  if (text === null) return;
  kw.note = text.trim();
  saveStore(); renderLeftPanel();
  setStatus('已更新注释'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Add keyword reference ───
function structAddKwRef(side, pathArr, kwIdx) {
  let node = structGetNode(side, pathArr);
  if (!node || !node.keywords) return;
  let kw = node.keywords[kwIdx];
  if (typeof kw==='string') { kw = { word: kw, note: '', reference: '' }; node.keywords[kwIdx] = kw; }
  let text = prompt('添加原文引用：', kw.reference||'');
  if (text === null) return;
  kw.reference = text.trim();
  saveStore(); renderLeftPanel();
  setStatus('已添加引用'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Edit section note ───
function structEditNote(side, pathArr) {
  let node = structGetNode(side, pathArr);
  if (!node) return;
  let text = prompt('编辑章节注释：', node.note||'');
  if (text === null) return;
  node.note = text.trim();
  saveStore(); renderLeftPanel();
  setStatus('已更新注释'); setTimeout(()=>setStatus('就绪'),1500);
}

// ─── CRUD: Add section reference ───
function structEditRef(side, pathArr) {
  let node = structGetNode(side, pathArr);
  if (!node) return;
  let text = prompt('添加/编辑原文引用：', node.reference||'');
  if (text === null) return;
  node.reference = text.trim();
  saveStore(); renderLeftPanel();
  setStatus('已更新引用'); setTimeout(()=>setStatus('就绪'),1500);

// ─── Right-click context menus ───
var _structCtxMenu = null;

function hideStructCtxMenu() {
  if (_structCtxMenu) { _structCtxMenu.remove(); _structCtxMenu = null; }
}

function structContextMenu(e, pathIdx, side) {
  e.preventDefault(); e.stopPropagation();
  hideStructCtxMenu();
  let node = structGetNode(side, [pathIdx]);
  if (!node) return;
  let items = [
    `<div class="cm-item" onclick="structAddChildSection('${side}',[${pathIdx}]);hideStructCtxMenu()">➕ 添加子章节</div>`,
    `<div class="cm-item" onclick="structAddKeyword('${side}',[${pathIdx}]);hideStructCtxMenu()">🔑 添加关键词</div>`,
  ];
  if (!node.note) items.push(`<div class="cm-item" onclick="structEditNote('${side}',[${pathIdx}]);hideStructCtxMenu()">📝 添加注释</div>`);
  else items.push(`<div class="cm-item" onclick="structEditNote('${side}',[${pathIdx}]);hideStructCtxMenu()">📝 编辑注释</div>`);
  if (!node.reference) items.push(`<div class="cm-item" onclick="structEditRef('${side}',[${pathIdx}]);hideStructCtxMenu()">📎 添加原文引用</div>`);
  else items.push(`<div class="cm-item" onclick="structEditRef('${side}',[${pathIdx}]);hideStructCtxMenu()">📎 编辑原文引用</div>`);
  items.push(`<div class="cm-divider"></div>`);
  items.push(`<div class="cm-item" onclick="structRenameSection('${side}',[${pathIdx}]);hideStructCtxMenu()">✏️ 重命名</div>`);
  items.push(`<div class="cm-item danger" onclick="structDeleteSection('${side}',[${pathIdx}]);hideStructCtxMenu()">🗑️ 删除章节</div>`);
  showStructCtxMenu(e, items.join(''));
}

function structKwContextMenu(e, pathIdx, kwIdx, side) {
  e.preventDefault(); e.stopPropagation();
  hideStructCtxMenu();
  let items = [
    `<div class="cm-item" onclick="structEditKwNote('${side}',[${pathIdx}],${kwIdx});hideStructCtxMenu()">📝 编辑注释</div>`,
    `<div class="cm-item" onclick="structAddKwRef('${side}',[${pathIdx}],${kwIdx});hideStructCtxMenu()">📎 添加/编辑引用</div>`,
    `<div class="cm-divider"></div>`,
    `<div class="cm-item danger" onclick="structDeleteKeyword('${side}',[${pathIdx}],${kwIdx});hideStructCtxMenu()">🗑️ 删除关键词</div>`,
  ];
  showStructCtxMenu(e, items.join(''));
}

function showStructCtxMenu(e, itemsHtml) {
  let menu = document.createElement('div');
  menu.className = 'tree-context-menu';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.innerHTML = itemsHtml;
  document.body.appendChild(menu);
  _structCtxMenu = menu;

  // Adjust if off-screen
  let r = menu.getBoundingClientRect();
  if (r.right > window.innerWidth) menu.style.left = (e.clientX - r.width) + 'px';
  if (r.bottom > window.innerHeight) menu.style.top = (e.clientY - r.height) + 'px';

  setTimeout(() => {
    document.addEventListener('mousedown', function sc(ev) {
      if (menu.parentNode && !menu.contains(ev.target)) menu.remove();
      document.removeEventListener('mousedown', sc);
    });
  }, 80);
}

// ── 训练面板渲染 ──
function renderTrainingPanel() {
  let t = STORE.training;
  if (t.sessionActive) {
    return renderTrainingQuiz();
  }
  let modes = [
    { key:'technique', label:'辩论技巧', desc:'选择题+判断题 · 基础理论', icon:'🧠' },
    { key:'scenario', label:'辩论场景', desc:'场景模拟题 · 实战应用', icon:'🎭' },
    { key:'mixed', label:'混合训练', desc:'随机交替 · 全面检验', icon:'🔄' }
  ];
  let diffs = [
    { key:'easy', label:'简单', color:'var(--green)', score:10, desc:'基础概念 · 每题+10分' },
    { key:'medium', label:'中等', color:'var(--yellow)', score:15, desc:'理论应用 · 每题+15分' },
    { key:'hard', label:'困难', color:'var(--red)', score:20, desc:'深度辨析 · 每题+20分' }
  ];

  let modeHtml = modes.map(m=>`<button class="btn ${t.mode===m.key?'btn-ai':''}" onclick="trainSetMode('${m.key}')" style="flex:1;text-align:center;padding:10px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px;"><span style="font-size:20px;">${m.icon}</span>${m.label}<span style="font-size:9px;opacity:0.6;">${m.desc}</span></button>`).join('');
  let diffHtml = diffs.map(d=>`<button class="btn ${t.difficulty===d.key?'btn-save':''}" onclick="trainSetDiff('${d.key}')" style="flex:1;text-align:center;padding:8px;font-size:11px;background:var(--bg-surface0);border:1px solid var(--bg-surface1);"><div style="font-weight:700;color:${d.color};">${d.label}</div><div style="font-size:9px;opacity:0.6;color:var(--subtext0);">${d.desc}</div></button>`).join('');

  // History
  let sessions = t.sessions || [];
  let histHtml = '';
  if (sessions.length) {
    let recent = sessions.slice(0, 5);
    histHtml = `<div style="margin-top:8px;border-top:1px solid var(--bg-surface0);padding-top:8px;"><div style="font-size:11px;color:var(--overlay0);margin-bottom:6px;">📜 最近训练记录</div>`;
    recent.forEach(s=>{
      histHtml += `<div onclick="trainViewSession('${s.id}')" style="padding:6px 8px;cursor:pointer;border-radius:4px;font-size:11px;margin-bottom:2px;transition:background 0.1s;" onmouseover="this.style.background=var(--bg-surface0)" onmouseout="this.style.background="${2}">
        <span>${trainModeLabel(s.mode)}</span> · <span style="color:${trainDiffColor(s.difficulty)}">${s.difficulty=== 'easy'?'简单':s.difficulty==='hard'?'困难':'中等'}</span>
        <span style="float:right;">${s.correct}/${s.total} ${s.score}分</span>
        <div style="font-size:9px;color:var(--overlay0);">${s.date}</div>
      </div>`;
    });
    histHtml += `</div>`;
  }

  return `<div class="panel-header">🎯 模拟训练 <span class="demo-badge">体验版</span></div>
    <div class="rp-body" style="padding:10px;overflow-y:auto;">
      <div class="training-config">
        <h4>训练模式</h4>
        <div style="display:flex;gap:6px;margin-top:6px;">${modeHtml}</div>
        <h4 style="margin-top:12px;">难度等级</h4>
        <div style="display:flex;gap:6px;margin-top:6px;">${diffHtml}</div>
      </div>
      <button class="btn btn-ai" onclick="trainStart()" style="width:100%;margin-top:12px;padding:12px;font-size:13px;">🚀 开始训练 (${trainQuestionCount()}题)</button>
      <div class="ai-notice" style="margin:10px 0;">
        <div class="ai-notice-icon">🤖</div>
        <div class="ai-notice-text"><strong>AI出题 & 总结</strong><br><span style="font-size:9px;">体验版使用默认题库，AI动态出题和智能总结需桌面版</span></div>
      </div>
      ${histHtml}
    </div>`;
}

function trainQuestionCount() { return DEFAULT_QUESTIONS.length; }
function trainModeLabel(m) { return m==='technique'?'🧠 技巧':m==='scenario'?'🎭 场景':'🔄 混合'; }
function trainDiffColor(d) { return d==='easy'?'var(--green)':d==='hard'?'var(--red)':'var(--yellow)'; }
function trainDiffScore(d) { return {easy:10,medium:15,hard:20}[d]||15; }
function trainSetMode(m) { STORE.training.mode=m; refreshTrainingPanel(); }
function trainSetDiff(d) { STORE.training.difficulty=d; refreshTrainingPanel(); }

// ── 开始训练 ──
function trainStart() {
  let t = STORE.training;
  let mode = t.mode;
  let diff = t.difficulty;

  // 从默认题库筛选
  let pool = DEFAULT_QUESTIONS.slice();
  if (mode !== 'mixed') {
    // 场景模式目前用所有题(体验版)，桌面版AI会生成专门场景题
    if (mode === 'technique') pool = pool.filter(q=>q.type!=='scenario'&&q.topic!=='场景策略');
  }
  // 按难度筛选（体验版默认题库题数有限，不过度筛选）
  let questions = pool.filter(q=>q.difficulty===diff);
  if (questions.length < 5) questions = pool;  // 不够5题就用全部

  // Shuffle and pick 8
  questions = shuffleArray(questions).slice(0, 8);

  t.questions = questions.map((q,i)=>{ return {...q, index:i+1, user_answer:'', is_correct:false}; });
  t.currentQ = 0;
  t.score = 0;
  t.correct = 0;
  t.answered = false;
  t.sessionActive = true;
  setStatus('训练开始！共 '+questions.length+' 题');
  setTimeout(()=>setStatus('就绪'), 2000);
  refreshTrainingPanel();
}

function shuffleArray(arr) { let a=arr.slice(); for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ── 答题页 ──
function renderTrainingQuiz() {
  let t = STORE.training;
  let q = t.questions[t.currentQ];
  if (!q) { t.sessionActive=false; return renderTrainingPanel(); }

  let progress = `${t.currentQ+1} / ${t.questions.length}`;
  let typeLabel = q.type==='truefalse'?'判断题':'选择题';
  let html = `<div class="panel-header">🎯 模拟训练</div>
    <div class="rp-body" style="padding:10px;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:11px;color:var(--overlay0);">${typeLabel} · ${progress}</span>
        <button class="btn" onclick="trainEnd()" style="font-size:11px;padding:4px 12px;border:1px solid rgba(243,139,168,0.3);color:var(--red);border-radius:6px;transition:all 0.2s;" onmouseover="this.style.background='rgba(243,139,168,0.1)'" onmouseout="this.style.background=">✕ 结束</button>
      </div>
      <div style="font-size:11px;color:var(--blue);margin-bottom:4px;">[${trainDiffColor(q.difficulty)}] ${q.topic||''}</div>
      <div style="font-size:13px;line-height:1.6;margin-bottom:12px;font-weight:500;color:var(--text);">${fwEsc(q.question)}</div>`;

  // Options
  q.options.forEach((opt, i) => {
    let letter = String.fromCharCode(65+i);
    let sel = q.user_answer === letter;
    let correct = q.is_correct && q.correct === letter;
    let wrong = t.answered && !q.is_correct && q.user_answer === letter;
    let showCorrect = t.answered && q.correct === letter;
    let bg = sel ? 'var(--bg-surface0)' : '';
    if (correct) bg = 'rgba(166,227,161,0.12)';
    if (wrong) bg = 'rgba(243,139,168,0.12)';
    let border = '';
    if (correct||showCorrect) border = 'border:1px solid var(--green);';
    if (wrong) border = 'border:1px solid var(--red);';

    let cls = t.answered ? 'train-option answered' : 'train-option';
    html += `<div class="${cls}" onclick="trainAnswer(${i})" style="background:${bg};${border}">
      ${fwEsc(opt)}
      ${correct?' ✅':''}${wrong?' ❌':''}
    </div>`;
  });

  // Result feedback
  if (t.answered) {
    let isCorrect = q.is_correct;
    let score = trainDiffScore(q.difficulty);
    let expl = (typeof q.explanation==='object') ? q.explanation[q.correct] : (q.explanation||'');
    let tip = (typeof q.tips==='object') ? (q.tips[q.correct]||q.tips[q.user_answer]||'') : '';

    html += `<div style="margin-top:12px;padding:12px;background:${isCorrect?'rgba(166,227,161,0.06)':'rgba(243,139,168,0.06)'};border-radius:8px;border-left:3px solid ${isCorrect?'var(--green)':'var(--red)'};">
      <div style="font-weight:700;font-size:13px;color:${isCorrect?'var(--green)':'var(--red)'};">${isCorrect?`✅ 回答正确！+${score}分`:`❌ 回答错误 (正确答案: ${fwEsc(q.correct)}) +0分`}</div>
      ${expl?`<div style="margin-top:8px;font-size:11px;color:var(--subtext0);">📖 ${fwEsc(expl)}</div>`:''}
      ${tip?`<div style="margin-top:6px;font-size:11px;color:var(--yellow);">💡 ${fwEsc(tip)}</div>`:''}
    </div>`;

    let isLast = t.currentQ >= t.questions.length - 1;
    html += `<button class="btn btn-ai" onclick="${isLast?'trainFinish()':'trainNext()'}" style="width:100%;margin-top:10px;padding:10px;">${isLast?'查看成绩':'下一题 →'}</button>`;
  }

  html += `</div>`;
  return html;
}

function trainAnswer(idx) {
  let t = STORE.training;
  if (t.answered) return;
  let q = t.questions[t.currentQ];
  q.user_answer = String.fromCharCode(65+idx);
  q.is_correct = q.user_answer === q.correct;
  if (q.is_correct) { t.score += trainDiffScore(q.difficulty); t.correct++; }
  t.answered = true;
  refreshTrainingPanel();
}

function trainNext() {
  let t = STORE.training;
  if (t.currentQ < t.questions.length - 1) {
    t.currentQ++;
    t.answered = false;
  }
  refreshTrainingPanel();
}

function trainEnd() {
  if (!confirm('确定结束训练？当前进度将丢失。')) return;
  STORE.training.sessionActive = false;
  refreshTrainingPanel();
  setStatus('训练已取消');
  setTimeout(()=>setStatus('就绪'),1500);
}

function trainFinish() {
  let t = STORE.training;
  t.sessionActive = false;
  // Save session
  let now = new Date();
  let session = {
    id: 'train_'+now.getTime(),
    date: now.toLocaleDateString('zh-CN')+' '+now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),
    mode: t.mode, difficulty: t.difficulty,
    total: t.questions.length, correct: t.correct, score: t.score,
    questions: t.questions
  };
  if (!t.sessions) t.sessions = [];
  t.sessions.unshift(session);
  if (t.sessions.length > 50) t.sessions = t.sessions.slice(0, 50);  // keep max 50
  saveStore();
  // Show summary
  renderTrainingSummary(session);
}

function renderTrainingSummary(session) {
  let correctRate = session.total ? Math.round(session.correct/session.total*100) : 0;
  let grade = correctRate>=90?'🏆 优秀':correctRate>=70?'⭐ 良好':correctRate>=50?'📚 加油':'💪 继续努力';
  // Difficulty stats
  let diffStats = {};
  session.questions.forEach(q=>{
    let d = q.difficulty||'medium';
    if (!diffStats[d]) diffStats[d] = {total:0,correct:0};
    diffStats[d].total++;
    if (q.is_correct) diffStats[d].correct++;
  });

  let diffHtml = Object.entries(diffStats).map(([k,v])=>{
    let rate = v.total?Math.round(v.correct/v.total*100):0;
    let barW = Math.max(2, rate);
    return `<div style="margin:4px 0;font-size:11px;">
      <span style="display:inline-block;width:40px;color:${trainDiffColor(k)};">${k==='easy'?'简单':k==='hard'?'困难':'中等'}</span>
      <span style="display:inline-block;width:60px;">${v.correct}/${v.total}题</span>
      <span style="display:inline-block;width:80px;height:6px;background:var(--bg-surface0);border-radius:3px;vertical-align:middle;">
        <span style="display:block;width:${barW}%;height:100%;background:${trainDiffColor(k)};border-radius:3px;"></span>
      </span>
    </div>`;
  }).join('');

  let html = `<div class="panel-header">📊 训练成绩</div>
    <div class="rp-body" style="padding:10px;overflow-y:auto;">
      <div style="text-align:center;padding:16px 0;">
        <div style="font-size:2rem;font-weight:700;color:var(--gold);">${session.score}分</div>
        <div style="font-size:13px;color:var(--subtext0);margin-top:4px;">${session.correct}/${session.total}题正确 · ${correctRate}%</div>
        <div style="font-size:24px;margin-top:8px;">${grade}</div>
      </div>
      <div style="border-top:1px solid var(--bg-surface0);padding-top:8px;">
        <div style="font-size:11px;color:var(--overlay0);margin-bottom:4px;">📊 难度分布</div>
        ${diffHtml}
      </div>
      <div class="ai-notice" style="margin:10px 0;">
        <div class="ai-notice-icon">🤖</div>
        <div class="ai-notice-text"><strong>AI智能总结</strong><br><span style="font-size:9px;">体验版不支持AI总结，桌面版可生成200-300字个性化评价</span></div>
      </div>
      <button class="btn btn-save" onclick="trainNewSession()" style="width:100%;margin-top:8px;padding:10px;">🔄 开始新训练</button>
      <button class="btn" onclick="trainViewSession('${session.id}')" style="width:100%;margin-top:4px;padding:8px;font-size:11px;">📋 查看详细记录</button>
    </div>`;
  openRightPanel('training-summary', html);
}

function trainViewSession(sid) {
  let s = (STORE.training.sessions||[]).find(x=>x.id===sid);
  if (!s) return;
  let html = `<div class="panel-header">📋 训练记录</div>
    <div class="rp-body" style="padding:10px;overflow-y:auto;">
      <div style="font-size:11px;color:var(--overlay0);">${trainModeLabel(s.mode)} · ${s.date} · ${s.correct}/${s.total}题 ${s.score}分</div>
      <div style="margin-top:8px;">`;
  s.questions.forEach((q,i)=>{
    let icon = q.is_correct?'✅':'❌';
    html += `<div onclick="trainViewDetail('${sid}',${i})" style="padding:8px;cursor:pointer;border-radius:4px;margin-bottom:3px;font-size:11px;transition:background 0.1s;border-left:3px solid ${q.is_correct?'var(--green)':'var(--red)'};background:${i%2?'var(--bg-mantle)':''};" onmouseover="this.style.background=var(--bg-surface0)" onmouseout="this.style.background='${i%2?'var(--bg-mantle)':''}'">
        <span>${icon} ${fwEsc(q.question.substring(0,40))}${q.question.length>40?'...':''}</span>
        <span style="float:right;font-size:10px;color:var(--overlay0);">${q.user_answer||'-'}→${q.is_correct?'✓':'✗'}</span>
      </div>`;
  });
  html += `</div>
    <button class="btn btn-save" onclick="trainNewSession()" style="width:100%;margin-top:8px;padding:8px;">🔄 开始新训练</button>
    <button class="btn" onclick="renderRightPanel()" style="width:100%;margin-top:4px;padding:8px;font-size:11px;">← 返回训练</button>
  </div>`;
  openRightPanel('training-detail', html);
}

function trainViewDetail(sid, qIdx) {
  let s = (STORE.training.sessions||[]).find(x=>x.id===sid);
  if (!s || qIdx>=s.questions.length) return;
  let q = s.questions[qIdx];
  let letter = q.user_answer||'-';
  let correctLetter = q.correct||'';
  let expl = (typeof q.explanation==='object') ? q.explanation[correctLetter] : (q.explanation||'');
  let tip = (typeof q.tips==='object') ? (q.tips[letter]||'') : '';
  let rightTip = (typeof q.tips==='object') ? (q.tips[correctLetter]||'') : '';

const NOTES_COLORS = { green:"#a6e3a1", yellow:"#f9e2af", orange:"#fab387", red:"#f38ba8", purple:"#cba6f7" };
var _notesColor = 'green';  // 当前选中颜色
var _notesSearchTerm = '';

function renderNotesPanel() {
  let pinCount = STORE.notes.filter(n=>n.pinned).length;
  let headerHtml = `<div class="panel-header">📝 便签
    <span style="font-size:10px;color:var(--overlay0);margin-left:auto;">
      ${STORE.notes.length}条 ${pinCount>0?'🔝'+pinCount:''}
    </span>`;
  // Color picker row
  let colorRow = Object.entries(NOTES_COLORS).map(([k,c])=>
    `<span onclick="setNotesColor('${k}')" style="display:inline-block;width:16px;height:16px;border-radius:50%;background:${c};cursor:pointer;margin-right:4px;border:${_notesColor===k?'2px solid #fff':'2px solid transparent'};transition:all 0.15s;" title="${k}"></span>`
  ).join('');

  headerHtml += `</div>`;
  return headerHtml + `<div class="rp-body" style="display:flex;flex-direction:column;height:calc(100% - 40px);">
    <div class="notes-search"><input id="note-search" placeholder="🔍 搜索便签..." oninput="notesSearch()" value="${fwEsc(_notesSearchTerm)}"><button class="btn" onclick="notesExport()" style="padding:4px 8px;font-size:10px;white-space:nowrap;" title="导出全部便签">📤</button></div>
    <div id="notes-list-container" style="flex:1;overflow-y:auto;">${renderNotesList()}</div>
    <div class="note-input-area">
      <div style="margin-bottom:4px;">${colorRow}</div>
      <textarea id="note-input" placeholder="写便签...(Ctrl+Enter 添加)" onkeydown="notesKeydown(event)"></textarea>
      <button class="btn btn-save" onclick="notesAdd()">+ 添加</button>
    </div>
  </div>`;
}

function renderNotesList() {
  let term = (_notesSearchTerm||'').toLowerCase();
  let notes = STORE.notes.slice();
  // 排序: 置顶优先, 搜索结果按匹配次数降序
  if (term) {
    let scored = notes.map(n=>{ return {note:n, score:(n.text||'').toLowerCase().split(term).length-1}; }).filter(x=>x.score>0);
    scored.sort((a,b)=>b.score-a.score);
    notes = scored.map(x=>x.note);
  } else {
    notes.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  }
  if (!notes.length) return '<div style="text-align:center;padding:20px;color:var(--overlay0);">暂无便签</div>';
  return notes.map((n,i)=>{
    let realIdx = STORE.notes.indexOf(n);
    let colorHex = NOTES_COLORS[n.color]||'#a6e3a1';
    let isPinned = !!n.pinned;
    let text = n.text||'';
    let shortText = text.length>80?text.substring(0,80)+'...':text;
    let expanded = n.expanded || false;
    // 搜索高亮
    let displayText = term ? highlightText(expanded?text:shortText, term) : (expanded?text:shortText);
    let needToggle = text.length > 80;
    let cardBg = isPinned ? 'var(--bg-surface0)' : 'var(--bg-mantle)';
    let cardBorder = isPinned ? `2px solid ${colorHex}` : '1px solid var(--bg-surface0)';
    let pinIcon = isPinned ? '🔝' : '📌';
    let pinTitle = isPinned ? '取消置顶' : '置顶';
    return `<div class="note-card" style="background:${cardBg};border:${cardBorder};margin-bottom:6px;border-radius:8px;overflow:hidden;">
      <div style="display:flex;">
        <div style="width:5px;flex-shrink:0;background:${colorHex};border-radius:4px 0 0 4px;"></div>
        <div style="flex:1;padding:8px 10px;min-width:0;">
          <div class="note-text" style="font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;">${displayText}</div>
          ${needToggle?`<span onclick="notesToggle(${realIdx})" style="font-size:10px;color:var(--blue);cursor:pointer;margin-top:2px;display:inline-block;">${expanded?'▲ 收起':'▼ 展开全部'}</span>`:''}
          <div style="display:flex;gap:4px;margin-top:4px;align-items:center;">
            <span style="font-size:9px;color:var(--overlay0);">${n.created_at||''}</span>
            <span style="flex:1;"></span>
            <button onclick="notesPin(${realIdx})" style="background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;color:var(--overlay0);" title="${pinTitle}">${pinIcon}</button>
            <button onclick="notesChangeColor(${realIdx})" style="background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;color:var(--overlay0);" title="改颜色">🎨</button>
            <button onclick="notesEdit(${realIdx})" style="background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;color:var(--overlay0);" title="编辑">✏️</button>
            <button onclick="notesDelete(${realIdx})" style="background:none;border:none;cursor:pointer;font-size:10px;padding:1px 3px;color:var(--red);" title="删除">✕</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function highlightText(text, term) {
  if (!term) return fwEsc(text);
  let re = new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return fwEsc(text).replace(re, '<mark style="background:rgba(249,226,175,0.25);color:#f9e2af;border-radius:2px;padding:0 1px;">$1</mark>');
}
