// ======================== 辩论框架画布 (对齐桌面版 FrameworkCanvas + FrameworkNodeWidget) ========================
const FW_TYPES = { position:["🧭 立场","#f38ba8"], definition:["📖 定义","#89b4fa"], criterion:["⚖️ 判准","#f9e2af"], argument:["💡 论点","#a6e3a1"], evidence:["📊 论据","#fab387"], value:["💎 价值","#cba6f7"] };
var fwPendingSource = null;  // 正在连接的源节点 id

function renderFramework() {
  let btns = Object.entries(FW_TYPES).map(([k,v])=>`<button onclick="fwAddNode('${k}')" style="border-left:3px solid ${v[1]};padding-left:8px;">${v[0]}</button>`).join('');
  return `<div class="fw-toolbar">
    ${btns}
    <span style="flex:1"></span>
    <button onclick="fwAutoLayout()" title="自动调整框架布局" style="color:var(--gold);">🔧 自动布局</button>
  </div>
  <div id="fw-canvas-wrap">
    <svg id="fw-connections" style="position:absolute;inset:0;pointer-events:none;z-index:9999;"></svg>
    <div id="fw-canvas" style="position:absolute;inset:0;"></div>
  </div>`;
}

function fwAutoSave() { saveStore(); }
function fwNodeEl(id) { return document.getElementById('fw-node-'+id); }

function refreshFwCanvas() {
  let canvas = document.getElementById('fw-canvas');
  let svg = document.getElementById('fw-connections');
  if (!canvas || !svg) return;
  let nodes = STORE.fwData.nodes || [];

  // Clear old nodes
  canvas.innerHTML = '';

  // Render nodes
  nodes.forEach(nd => {
    let el = document.createElement('div');
    el.className = 'fw-node-el';
    el.id = 'fw-node-' + nd.id;
    el.style.left = (nd.x||50) + 'px';
    el.style.top = (nd.y||50) + 'px';
    el.style.width = (nd.w||140) + 'px';
    el.style.height = (nd.h||60) + 'px';
    let t = FW_TYPES[nd.type] || FW_TYPES.argument;
    el.style.borderColor = t[1];
    el.style.background = t[1]+'10';  // tinted background

    el.innerHTML = `<div class="fw-type-label" style="color:${t[1]}">${t[0]}</div>
      <div class="fw-text">${fwTruncate(nd.text||'双击编辑', nd.w||140)}</div>
      <button class="fw-delete" onclick="event.stopPropagation();fwDeleteNode(${nd.id})">×</button>
      <div class="fw-handle" data-fw-resize="${nd.id}"></div>`;
    el.setAttribute('oncontextmenu', 'fwNodeContextMenu(event,'+nd.id+');return false;');
    el.setAttribute('onmousedown', 'fwNodeMouseDown(event,'+nd.id+')');
    el.setAttribute('ondblclick', 'fwEditNode('+nd.id+')');
    canvas.appendChild(el);
  });

  // Draw connections
  fwDrawConnections();

  // Canvas click on empty space cancels connection
  canvas.parentElement.onclick = function(e) {
    if (fwPendingSource && e.target === canvas || e.target === canvas.parentElement) {
      fwCancelConnect();
    }
  };
}

// ─── Text Truncation (对齐 _truncate_text) ───
function fwTruncate(text, nodeW) {
  if (!text) return '双击编辑';
  let cpl = Math.max(10, Math.floor((nodeW - 20) / 10));
  let maxLines = 5;
  let paragraphs = text.split('\n');
  let lines = [];
  for (let para of paragraphs) {
    if (!para) { lines.push(''); if (lines.length>=maxLines) break; continue; }
    for (let i=0; i<para.length; i+=cpl) {
      lines.push(para.slice(i, i+cpl));
      if (lines.length>=maxLines) break;
    }
    if (lines.length>=maxLines) break;
    if (lines.length>0 && lines.length>=maxLines) {
      let last = lines[lines.length-1];
      if (last.length > cpl-1) last = last.slice(0, cpl-1);
      lines[lines.length-1] = last + '…';
      break;
    }
  }
  return lines.join('\n') || '双击编辑';
}

// ─── Drag ───
var fwDragId=null, fwDragOX=0, fwDragOY=0;
function fwNodeMouseDown(e, id) {
  // 连接模式：点击目标节点完成连接
  if (fwPendingSource) {
    if (fwPendingSource !== id) { fwFinishConnect(id); }
    else { fwCancelConnect(); }
    return;
  }
  if (e.button!==0) return;
  if (e.target.closest('.fw-handle')) { fwResizeStart(e, id); return; }
  if (e.target.closest('.fw-delete')) return;
  e.preventDefault();
  fwDragId = id;
  fwDragOX = e.clientX; fwDragOY = e.clientY;
  let nd = getFwNode(id);
  nd._savedX = nd.x; nd._savedY = nd.y;
  let el = fwNodeEl(id);
  if (el) el.style.cursor = 'move';
  document.addEventListener('mousemove', fwDragMove);
  document.addEventListener('mouseup', fwDragEnd);
}

function fwDragMove(e) {
  if (!fwDragId) return;
  let dx = e.clientX - fwDragOX, dy = e.clientY - fwDragOY;
  if (Math.abs(dx) < 2 && Math.abs(dy) < 2) return; // 防抖：移动小于2px不处理
  let nd = getFwNode(fwDragId);
  nd.x = Math.max(0, nd.x + dx);
  nd.y = Math.max(0, nd.y + dy);
  // Move descendants too (对齐 _move_descendants)
  fwMoveDescendants(fwDragId, dx, dy);
  fwDragOX = e.clientX; fwDragOY = e.clientY;
  let el = fwNodeEl(fwDragId);
  if (el) { el.style.left = nd.x+'px'; el.style.top = nd.y+'px'; }
  fwDrawConnections();
}

function fwDragEnd() {
  document.removeEventListener('mousemove', fwDragMove);
  document.removeEventListener('mouseup', fwDragEnd);
  if (fwDragId) {
    fwAutoSave();
    let el = fwNodeEl(fwDragId);
    if (el) el.style.cursor = '';
  }
  fwDragId = null;
}

// ─── Resize (对齐右下角 HANDLE_SIZE) ───
var fwResizeId=null, fwResizeOX=0, fwResizeOY=0, fwResizeOW=0, fwResizeOH=0;
function fwResizeStart(e, id) {
  e.preventDefault(); e.stopPropagation();
  fwResizeId = id;
  fwResizeSX = e.clientX; fwResizeSY = e.clientY;
  let nd = getFwNode(id);
  fwResizeOW = nd.w; fwResizeOH = nd.h;
  document.addEventListener('mousemove', fwResizeMove);
  document.addEventListener('mouseup', fwResizeEnd);
}

function fwResizeMove(e) {
  if (!fwResizeId) return;
  let dx = e.clientX - fwResizeSX, dy = e.clientY - fwResizeSY;
  let nd = getFwNode(fwResizeId);
  nd.w = Math.max(100, Math.min(400, fwResizeOW + dx));
  nd.h = Math.max(40, Math.min(200, fwResizeOH + dy));
  let el = fwNodeEl(fwResizeId);
  if (el) {
    el.style.width = nd.w+'px'; el.style.height = nd.h+'px';
    el.querySelector('.fw-text').textContent = fwTruncate(nd.text||'双击编辑', nd.w);
  }
  fwDrawConnections();
}

function fwResizeEnd() {
  document.removeEventListener('mousemove', fwResizeMove);
  document.removeEventListener('mouseup', fwResizeEnd);
  if (fwResizeId) fwAutoSave();
  fwResizeId = null;
}

// ─── Draw SVG connections (对齐 paintEvent 贝塞尔曲线) ───
function fwDrawConnections() {
  let svg = document.getElementById('fw-connections');
  let wrap = document.getElementById('fw-canvas-wrap');
  if (!svg || !wrap) return;
  // 动态设置 SVG 视口尺寸匹配容器实际大小（默认300×150会导致坐标裁剪）
  let wW = wrap.clientWidth || 800, wH = wrap.clientHeight || 600;
  svg.setAttribute('width', wW);
  svg.setAttribute('height', wH);
  svg.setAttribute('viewBox', '0 0 ' + wW + ' ' + wH);
  let nodes = STORE.fwData.nodes || [];
  let html = '';
  // SVG marker for arrowheads (one per color)
  let markerDefs = '';
  Object.values(FW_TYPES).forEach(([_,c])=>{
    markerDefs += `<marker id="fw-arrow-${c.slice(1)}" viewBox="0 0 8 6" refX="8" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="${c}" opacity="0.7"/></marker>`;
  });

  nodes.forEach(nd => {
    let srcEl = fwNodeEl(nd.id);
    if (!srcEl) return;
    (nd.children||[]).forEach(cid => {
      let tgtEl = fwNodeEl(cid);
      if (!tgtEl) return;
      let srcR = srcEl.getBoundingClientRect(), tgtR = tgtEl.getBoundingClientRect();
      let wrapR = document.getElementById('fw-canvas-wrap').getBoundingClientRect();
      let x1 = srcR.right - wrapR.left + 2, y1 = srcR.top - wrapR.top + srcR.height/2;
      let x2 = tgtR.left - wrapR.left - 2, y2 = tgtR.top - wrapR.top + tgtR.height/2;
      let cpDist = Math.max(Math.abs(x2-x1)*0.45, 50);
      let c = (FW_TYPES[nd.type]||FW_TYPES.argument)[1];
      let markerId = 'fw-arrow-'+c.slice(1);
      // Glow layer
      html += `<path d="M${x1},${y1} C${x1+cpDist},${y1} ${x2-cpDist},${y2} ${x2},${y2}" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="none" stroke-linecap="round"/>`;
      // Main line with arrow
      html += `<path d="M${x1},${y1} C${x1+cpDist},${y1} ${x2-cpDist},${y2} ${x2},${y2}" stroke="${c}" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#${markerId})"/>`;
    });
  });
  svg.innerHTML = `<defs>${markerDefs}</defs>${html}`;
}

// ─── Descendant movement (对齐 _move_descendants) ───
function fwMoveDescendants(rootId, dx, dy) {
  let nodes = STORE.fwData.nodes || [];
  let descendants = fwGetDescendantIds(rootId);
  descendants.forEach(did => {
    let nd = nodes.find(n=>n.id===did);
    if (nd) { nd.x = Math.max(0, nd.x + dx); nd.y = Math.max(0, nd.y + dy); }
    let el = fwNodeEl(did);
    if (el) { el.style.left = nd.x+'px'; el.style.top = nd.y+'px'; }
  });
}

function fwGetDescendantIds(rootId, visited) {
  visited = visited || new Set();
  let nodes = STORE.fwData.nodes || [];
  let root = nodes.find(n=>n.id===rootId);
  if (!root) return [];
  let ids = [];
  (root.children||[]).forEach(cid => {
    if (!visited.has(cid)) { visited.add(cid); ids.push(cid); ids = ids.concat(fwGetDescendantIds(cid, visited)); }
  });
  return ids;
}

// ─── Node CRUD ───
function getFwNode(id) {
  let nodes = STORE.fwData.nodes;
  let nd = nodes.find(n=>n.id===id);
  if (!nd) { nd = { id, type:'argument', text:'', x:50, y:50, w:140, h:60, children:[] }; nodes.push(nd); }
  return nd;
}

function fwAddNode(type) {
  let nodes = STORE.fwData.nodes || [];
  let id = STORE.fwData.nextId++;
  let x = 50 + Math.random()*200, y = 50 + nodes.length*70;
  nodes.push({ id, type, text:'', x, y, w:140, h:60, children:[] });
  fwAutoSave(); refreshFwCanvas();
  setStatus('已添加节点');
  setTimeout(()=>setStatus('就绪'), 1500);
}

function fwAddChildNode(parentId, type) {
  let nodes = STORE.fwData.nodes || [];
  let parent = nodes.find(n=>n.id===parentId);
  if (!parent) return;
  let id = STORE.fwData.nextId++;
  let x = parent.x + parent.w + 70, y = parent.y + (parent.children||[]).length * 70;
  nodes.push({ id, type, text:'', x, y, w:140, h:60, children:[] });
  (parent.children = parent.children||[]).push(id);
  fwAutoSave(); refreshFwCanvas();
  setStatus('已添加子节点');
  setTimeout(()=>setStatus('就绪'), 1500);
}

function fwDeleteNode(id) {
  if (!confirm('确定删除该节点及所有后代？')) return;
  let nodes = STORE.fwData.nodes || [];
  let toDelete = new Set([id, ...fwGetDescendantIds(id)]);
  // Remove from children lists
  nodes.forEach(n => { if (n.children) n.children = n.children.filter(c=>!toDelete.has(c)); });
  STORE.fwData.nodes = nodes.filter(n=>!toDelete.has(n.id));
  if (fwPendingSource === id) fwPendingSource = null;
  fwAutoSave(); refreshFwCanvas();
  setStatus('节点已删除');
  setTimeout(()=>setStatus('就绪'), 1500);
}

// ─── Inline Editing (对齐 _edit_text) ───
function fwEditNode(id) {
  let el = fwNodeEl(id);
  if (!el) return;
  let nd = getFwNode(id);
  let textEl = el.querySelector('.fw-text');
  if (!textEl || el.querySelector('.fw-edit-input')) return;
  let t = FW_TYPES[nd.type] || FW_TYPES.argument;
  let input = document.createElement('textarea');
  input.className = 'fw-edit-input';
  input.value = nd.text || '';
  input.style.cssText = 'position:absolute;top:18px;left:8px;right:8px;bottom:4px;background:#2a2a3a;color:#fff;border:1px solid '+t[1]+';border-radius:4px;padding:2px 4px;font-size:11px;resize:none;outline:none;font-family:inherit;z-index:5;';
  textEl.style.display = 'none';
  el.appendChild(input);
  input.focus();
  input.select();
  input.addEventListener('keydown', function(ev) {
    if (ev.key==='Escape') { commit(); return; }
    if (ev.key==='Enter' && ev.ctrlKey) { commit(); return; }
  });
  input.addEventListener('blur', commit);
  function commit() {
    nd.text = input.value.trim() || '双击编辑';
    input.remove();
    textEl.style.display = '';
    textEl.textContent = fwTruncate(nd.text, nd.w);
    fwAutoSave();
    fwDrawConnections();
  }
}

// ─── Context Menu ───
function fwNodeContextMenu(e, id) {
  hideFwContextMenu();
  let menu = document.createElement('div');
  menu.className = 'tree-context-menu';
  menu.id = 'fw-context-menu';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';

  let typeBtns = Object.entries(FW_TYPES).map(([k,v])=>
    `<div class="cm-item" onclick="fwAddChildNode(${id},'${k}');hideFwContextMenu()">${v[0]}</div>`
  ).join('');

  menu.innerHTML = `
    <div class="cm-item" onclick="fwEditNode(${id});hideFwContextMenu()">✏️ 编辑文本</div>
    <div class="cm-item" onclick="fwDeleteNode(${id});hideFwContextMenu()">🗑 删除节点</div>
    <div class="cm-divider"></div>
    <div style="padding:4px 16px;font-size:10px;color:var(--overlay0);">➕ 添加子节点</div>
    ${typeBtns}
    <div class="cm-divider"></div>
    ${!fwPendingSource ? `<div class="cm-item" onclick="fwStartConnect(${id});hideFwContextMenu()">🔗 连接到子节点</div>` : ''}
    ${fwPendingSource ? `<div class="cm-item" onclick="fwCancelConnect();hideFwContextMenu()">❌ 取消连接</div>` : ''}
  `;
  document.body.appendChild(menu);
  // Viewport edge correction
  let r = menu.getBoundingClientRect();
  if (r.right > window.innerWidth) menu.style.left = (e.clientX - r.width) + 'px';
  if (r.bottom > window.innerHeight) menu.style.top = (e.clientY - r.height) + 'px';
  // Close on next click outside (delayed to skip current event)
  setTimeout(function() {
    document.addEventListener('mousedown', function fwClose(ev) {
      if (menu && menu.parentNode && !menu.contains(ev.target)) menu.remove();
      document.removeEventListener('mousedown', fwClose);
    });
  }, 80);
}

function hideFwContextMenu() {
  let m = document.getElementById('fw-context-menu');
  if (m) m.remove();
}

// ─── Connection ───
function fwStartConnect(id) {
  fwPendingSource = id;
  let el = fwNodeEl(id);
  if (el) el.classList.add('connecting');
  setStatus('🔗 已选择源节点，请点击目标子节点完成连接 (右键/点空白取消)');
}

function fwCancelConnect() {
  if (fwPendingSource) {
    let el = fwNodeEl(fwPendingSource);
    if (el) el.classList.remove('connecting');
  }
  fwPendingSource = null;
  setStatus('连接已取消');
  setTimeout(()=>setStatus('就绪'),1500);
}

function fwFinishConnect(targetId) {
  if (!fwPendingSource || fwPendingSource===targetId) { fwCancelConnect(); return; }
  let descendants = fwGetDescendantIds(targetId);
  if (descendants.includes(fwPendingSource) || fwGetDescendantIds(fwPendingSource).includes(targetId)) {
    alert('不能形成循环连接'); fwCancelConnect(); return;
  }
  let source = getFwNode(fwPendingSource);
  (source.children = source.children||[]).push(targetId);
  let srcEl = fwNodeEl(fwPendingSource);
  if (srcEl) srcEl.classList.remove('connecting');
  fwPendingSource = null;
  fwAutoSave(); refreshFwCanvas();
  setStatus('✅ 连接完成');
  setTimeout(()=>setStatus('就绪'),1500);
}

// ─── Auto Layout (对齐 auto_adjust_layout BFS 树形布局) ───
function fwAutoLayout(maxLines) {
  let nodes = STORE.fwData.nodes || [];
  if (!nodes.length) return;

  const MAX_LINES = maxLines || 5;
  const CHAR_W = 10;
  const LINE_H = 17;
  const MARGIN_W = 24;
  const TYPE_H = 24;
  const PAD_BOT = 12;

  nodes.forEach(nd => {
    let text = nd.text || "";
    if (!text) { nd.w = 140; nd.h = 52; return; }
    let chars = text.length;
    let min_cpl = Math.max(10, Math.ceil(chars / MAX_LINES));
    let best_w = 100, best_h = 40, best_score = Infinity;
    for (let cpl = min_cpl; cpl < Math.min(min_cpl + 30, 42); cpl++) {
      let w = Math.max(100, Math.min(400, Math.round(cpl * CHAR_W) + MARGIN_W));
      let lines = Math.min(Math.max(1, Math.ceil(chars / cpl)), MAX_LINES);
      let h = Math.max(40, Math.min(200, TYPE_H + Math.round(lines * LINE_H) + PAD_BOT));
      let t_cpl = Math.max(10, Math.floor((w - 20) / 10));
      let canShowAll = (t_cpl * MAX_LINES >= chars);
      let score = canShowAll ? Math.abs(w - h) : (100000 + Math.abs(w - h));
      if (score < best_score) { best_score = score; best_w = w; best_h = h; }
    }
    nd.w = best_w;
    nd.h = best_h;
  });

  let childIds = new Set();
  nodes.forEach(n => { (n.children || []).forEach(c => childIds.add(c)); });
  let roots = nodes.filter(n => !childIds.has(n.id));

  let nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);
  let heights = {};

  let stack = [];
  roots.forEach(r => stack.push([r.id, false]));
  while (stack.length) {
    let [nodeId, processed] = stack.pop();
    if (!nodeMap[nodeId]) { heights[nodeId] = 0; continue; }
    if (processed) {
      let nd = nodeMap[nodeId];
      let children = (nd.children || []).filter(c => nodeMap[c]);
      if (!children.length) { heights[nodeId] = nd.h; }
      else {
        let chH = children.reduce((s, c) => s + (heights[c] || 0), 0);
        heights[nodeId] = Math.max(nd.h, chH + (children.length - 1) * 24);
      }
    } else {
      if (nodeId in heights) continue;
      stack.push([nodeId, true]);
      let nd = nodeMap[nodeId];
      let chArr = nd.children || [];
      for (let ci = chArr.length - 1; ci >= 0; ci--) {
        if (!(chArr[ci] in heights)) stack.push([chArr[ci], false]);
      }
    }
  }

  const GAP_X = 70, MARGIN_L = 40, GAP_TREE = 50, CHILD_GAP = 24;
  let currentY = MARGIN_L;
  let queue = [];
  roots.forEach(r => {
    let subH = heights[r.id] || 0;
    queue.push({id: r.id, x: MARGIN_L, yc: currentY + subH / 2});
    currentY += subH + GAP_TREE;
  });
  let visited = new Set();
  while (queue.length) {
    let q = queue.shift();
    if (visited.has(q.id) || !nodeMap[q.id]) continue;
    visited.add(q.id);
    let nd = nodeMap[q.id];
    nd.x = q.x;
    nd.y = Math.round(q.yc - nd.h / 2);
    let children = (nd.children || []).filter(c => nodeMap[c]);
    if (!children.length) continue;
    let childX = q.x + nd.w + GAP_X;
    let totalH = children.reduce((s, c) => s + (heights[c] || 0), 0) + (children.length - 1) * CHILD_GAP;
    let cur = q.yc - totalH / 2;
    children.forEach(c => {
      let sh = heights[c] || 0;
      queue.push({id: c, x: childX, yc: cur + sh / 2});
      cur += sh + CHILD_GAP;
    });
  }

  nodes.forEach(nd => {
    let el = fwNodeEl(nd.id);
    if (el) {
      el.style.left = nd.x + "px";
      el.style.top = nd.y + "px";
      el.style.width = nd.w + "px";
      el.style.height = nd.h + "px";
      let t = el.querySelector(".fw-text");
      if (t) t.textContent = fwTruncate(nd.text || "双击编辑", nd.w);
    }
  });

  fwAutoSave(); fwDrawConnections();
  setStatus("框架布局已自动调整");
  setTimeout(() => setStatus("就绪"), 1500);
}

function renderRefDoc() {
  let rows = (STORE.refDoc||{}).rows || [];
  let mode = STORE.refViewMode || 'table';

  let toolbar = `<div class="fw-toolbar" style="justify-content:flex-start;">
    <button onclick="refAddRow()" style="color:var(--green);">+ 添加行</button>
    <button onclick="refDeleteRow()" style="color:var(--red);">− 删除行</button>
    <span style="flex:1;"></span>
    <button onclick="switchRefView('table')" style="${mode==='table'?'color:var(--gold);':'color:var(--overlay0);'}">📑 表格视图</button>
    <button onclick="switchRefView('cards')" style="${mode==='cards'?'color:var(--gold);':'color:var(--overlay0);'}">🃏 卡片视图</button>
    <button onclick="refSaveCurrent()" style="color:var(--blue);">💾 保存</button>
  </div>`;

  if (mode === 'cards') {
    return toolbar + renderRefCards(rows);
  }
  return toolbar + renderRefTable(rows);
}

function renderRefTable(rows) {
  let trs = rows.map((r,i) => {
    let a = typeof r==='object' ? (r.argument||'') : (r[0]||'');
    let c = typeof r==='object' ? (r.content||'') : (r[1]||'');
    let s = typeof r==='object' ? (r.source||'') : (r[2]||'');
    return `<tr data-row="${i}" style="background:${i%2===0?'var(--bg-base)':'var(--bg-mantle)'};">
      <td><textarea oninput="refCellChanged(this,${i},'argument')" onblur="refCellChanged(this,${i},'argument')">${fwEsc(a)}</textarea></td>
      <td><textarea oninput="refCellChanged(this,${i},'content')" onblur="refCellChanged(this,${i},'content')">${fwEsc(c)}</textarea></td>
      <td><textarea oninput="refCellChanged(this,${i},'source')" onblur="refCellChanged(this,${i},'source')">${fwEsc(s)}</textarea></td>
    </tr>`;
  }).join('');
  if (!trs) trs = `<tr><td colspan="3" style="text-align:center;color:var(--overlay0);padding:32px;">（暂无数据，点击上方 + 添加行）</td></tr>`;
  return `<div class="ref-table-wrap">
    <table>
      <thead><tr><th style="width:25%;">论证观点</th><th style="width:40%;">论证内容</th><th style="width:35%;">资料来源</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>
  </div>
  <div style="padding:8px 12px;font-size:10px;color:var(--overlay0);border-top:1px solid var(--bg-surface0);">共 ${rows.length} 条记录 · 双击单元格编辑 · Ctrl+Enter 换行</div>`;
}

function renderRefCards(rows) {
  if (!rows.length) return `<div class="ref-table-wrap"><div style="text-align:center;color:var(--overlay0);padding:32px;">（暂无数据，点击上方 + 添加行）</div></div>`;
  let cards = rows.map((r,i) => {
    let a = typeof r==='object' ? (r.argument||'') : (r[0]||'');
    let c = typeof r==='object' ? (r.content||'') : (r[1]||'');
    let s = typeof r==='object' ? (r.source||'') : (r[2]||'');
    return `<div class="ref-card">
      <div class="rc-label" style="color:#dfb460;">#${i+1} · 论证观点</div>
      <div class="rc-text" style="color:var(--text);margin-bottom:10px;font-size:14px;">${fwEsc(a||'（未填写）')}</div>
      <div class="rc-label" style="color:var(--green);">▎论证内容</div>
      <div class="rc-text" style="margin-bottom:10px;">${fwEsc(c||'（未填写）')}</div>
      <div class="rc-label" style="color:var(--blue);">▎资料来源</div>
      <div class="rc-text" style="font-size:11px;">${fwEsc(s||'（未填写）')}</div>
    </div>`;
  }).join('');
  return `<div class="ref-card-grid">${cards}</div>
    <div style="padding:8px 12px;font-size:10px;color:var(--overlay0);border-top:1px solid var(--bg-surface0);">共 ${rows.length} 张卡片</div>`;
}

function switchRefView(mode) {
  STORE.refViewMode = mode;
  setCentreBody(renderRefDoc());
}

// ─── CRUD ───
function refAddRow() {
  if (!STORE.refDoc) STORE.refDoc = { rows: [] };
  if (!STORE.refDoc.rows) STORE.refDoc.rows = [];
  STORE.refDoc.rows.push({ argument: '', content: '', source: '' });
  saveStore();
  setCentreBody(renderRefDoc());
  // Auto-focus the new row's first textarea
  setTimeout(() => {
    let tds = document.querySelectorAll('.ref-table-wrap tbody tr:last-child textarea');
    if (tds.length) tds[0].focus();
  }, 50);
  setStatus('已添加新行');
  setTimeout(() => setStatus('就绪'), 1500);
}

function refDeleteRow() {
  let rows = (STORE.refDoc||{}).rows || [];
  if (!rows.length) { setStatus('没有可删除的行'); return; }
  let idx = prompt(`共 ${rows.length} 行，输入要删除的行号 (1-${rows.length})：`);
  if (idx === null) return;
  idx = parseInt(idx) - 1;
  if (isNaN(idx) || idx < 0 || idx >= rows.length) { setStatus('无效行号'); return; }
  let row = rows[idx];
  let a = typeof row==='object' ? (row.argument||'') : (row[0]||'');
  if (!confirm(`删除第 ${idx+1} 行：${a ? a.substring(0,30)+'...' : '（空行）'}？`)) return;
  rows.splice(idx, 1);
  saveStore();
  setCentreBody(renderRefDoc());
  setStatus('已删除'); setTimeout(() => setStatus('就绪'), 1500);
}

function refCellChanged(textarea, rowIdx, field) {
  let rows = (STORE.refDoc||{}).rows || [];
  if (rowIdx >= rows.length) return;
  let row = rows[rowIdx];
  if (typeof row !== 'object' || Array.isArray(row)) {
    // 兼容旧格式：简单数组转对象格式
    let old = row || [];
    let newRow = { argument: old[0]||'', content: old[1]||'', source: old[2]||'' };
    newRow[field] = textarea.value;
    rows[rowIdx] = newRow;
  } else {
    row[field] = textarea.value;
  }
  saveStore();
}

function refSaveCurrent() {
  saveStore();
  setStatus('资料稿已保存');
  setTimeout(() => setStatus('就绪'), 1500);
}

$$('#right-nav .nav-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ let rpanel=btn.dataset.rpanel, action=btn.dataset.action; if(rpanel==='notes') toggleRightPanel('notes',renderNotesPanel); else if(rpanel==='training') toggleRightPanel('training',renderTrainingPanel); else if(rpanel==='ai-write') showDesktopRequired('AI写稿'); else if(rpanel==='ai-expand') showDesktopRequired('AI扩写'); else if(action==='ai-structure') showDesktopRequired('AI框架生成'); else showDesktopRequired('AI功能'); }); });
// 初始化
renderLeftPanel();
backToEmpty();
