<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarDebate 开发文档</title>
<link rel="icon" type="image/x-icon" href="../StarDebate.ico">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:#1e1e2e;color:#cdd6f4;line-height:1.7;
  -webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;
}

/* ===== Layout ===== */
#app{display:flex;height:100vh}

/* ===== Sidebar ===== */
#sidebar{
  width:280px;min-width:280px;height:100vh;overflow-y:auto;overflow-x:hidden;
  background:#181825;border-right:1px solid rgba(108,112,134,0.2);
  display:flex;flex-direction:column;flex-shrink:0;
}
.sidebar-header{
  padding:16px 20px;border-bottom:1px solid rgba(108,112,134,0.15);
  display:flex;align-items:center;gap:10px;
}
.sidebar-header .logo{font-size:20px}
.sidebar-header h2{
  font-size:15px;font-weight:700;color:#cdd6f4;white-space:nowrap;
}
.sidebar-header a{
  color:#6c7086;text-decoration:none;font-size:12px;
  margin-left:auto;transition:color .2s;
}
.sidebar-header a:hover{color:#cdd6f4}

/* category toggle */
.cat-group{border-bottom:1px solid rgba(108,112,134,0.1)}
.cat-header{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;cursor:pointer;
  font-size:13px;font-weight:600;color:#a6adc8;
  user-select:none;transition:background .2s;
}
.cat-header:hover{background:rgba(108,112,134,0.08)}
.cat-header .arrow{
  font-size:10px;transition:transform .2s;width:12px;text-align:center;flex-shrink:0;
}
.cat-group.collapsed .cat-header .arrow{transform:rotate(-90deg)}
.cat-group.collapsed .cat-files{display:none}
.cat-count{font-size:11px;color:#6c7086;margin-left:auto}

/* file list */
.cat-files{list-style:none;padding:0 0 6px}
.cat-files li a{
  display:block;padding:6px 20px 6px 36px;font-size:13px;
  color:#9399b2;text-decoration:none;
  border-left:2px solid transparent;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.cat-files li a:hover{color:#cdd6f4;background:rgba(137,180,250,0.06);border-left-color:rgba(137,180,250,0.3)}
.cat-files li a.active{
  color:#89b4fa;background:rgba(137,180,250,0.1);border-left-color:#89b4fa;font-weight:600;
}
.sidebar-footer{
  margin-top:auto;padding:12px 20px;
  font-size:11px;color:#585b70;text-align:center;
  border-top:1px solid rgba(108,112,134,0.1);
}

/* ===== Content ===== */
#content-wrapper{flex:1;height:100vh;overflow-y:auto;overflow-x:hidden}
#content{
  max-width:95%;margin:0 auto;padding:40px 48px 80px;
}
#content .loading{
  text-align:center;padding:80px 20px;color:#6c7086;font-size:14px;
}
#content .error{
  text-align:center;padding:80px 20px;color:#f38ba8;font-size:14px;
}
#content h1{
  font-size:28px;font-weight:800;color:#cdd6f4;
  margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid rgba(108,112,134,0.2);
  letter-spacing:-0.5px;
}
#content h2{
  font-size:20px;font-weight:700;color:#cdd6f4;
  margin:32px 0 12px;padding-bottom:6px;
  border-bottom:1px solid rgba(108,112,134,0.12);
}
#content h3{font-size:16px;font-weight:600;color:#bac2de;margin:24px 0 8px}
#content h4{font-size:14px;font-weight:600;color:#a6adc8;margin:20px 0 6px}
#content p{margin:8px 0;font-size:15px;line-height:1.8;color:#bac2de}
#content a{color:#89b4fa;text-decoration:none}
#content a:hover{text-decoration:underline}
#content ul,#content ol{margin:8px 0;padding-left:24px}
#content li{font-size:15px;line-height:1.8;color:#bac2de;margin:2px 0}
#content blockquote{
  margin:12px 0;padding:10px 16px;
  border-left:3px solid #89b4fa;
  background:rgba(137,180,250,0.06);border-radius:0 6px 6px 0;
  color:#a6adc8;font-size:14px;
}
#content blockquote p{margin:4px 0;color:#a6adc8}
/* code */
#content code{
  font-family:"Cascadia Code","JetBrains Mono","Fira Code","SF Mono",Consolas,monospace;
  font-size:13px;background:rgba(49,50,68,0.8);padding:2px 6px;
  border-radius:4px;color:#f5c2e7;
}
#content pre{
  margin:12px 0;padding:16px 20px;
  background:#11111b;border-radius:8px;overflow-x:auto;
  border:1px solid rgba(108,112,134,0.15);
}
#content pre code{
  background:transparent;padding:0;
  font-size:13px;line-height:1.65;color:#cdd6f4;
}
/* tables */
#content table{
  width:100%;margin:12px 0;border-collapse:collapse;
  font-size:14px;border-radius:8px;overflow:hidden;
}
#content th,#content td{
  padding:8px 14px;text-align:left;
  border-bottom:1px solid rgba(108,112,134,0.15);
}
#content th{
  background:rgba(137,180,250,0.08);color:#89b4fa;font-weight:600;font-size:13px;
}
#content td{color:#bac2de}
#content tr:hover td{background:rgba(108,112,134,0.05)}
/* hr */
#content hr{border:none;border-top:1px solid rgba(108,112,134,0.15);margin:24px 0}
/* img */
#content img{max-width:100%;border-radius:8px;margin:8px 0}
/* strong */
#content strong{color:#f5e0dc;font-weight:700}

/* ===== Mobile Toggle Button ===== */
#menu-toggle{
  display:none;position:fixed;top:12px;left:12px;z-index:100;
  width:36px;height:36px;border:none;border-radius:8px;
  background:#313244;color:#cdd6f4;font-size:18px;cursor:pointer;
  align-items:center;justify-content:center;
  border:1px solid rgba(108,112,134,0.2);
}

/* ===== Mobile Overlay ===== */
.sidebar-overlay{display:none}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(108,112,134,0.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(108,112,134,0.5)}

/* ===== hljs Catppuccin Mocha overrides ===== */
.hljs{background:transparent!important;padding:0!important}
.hljs-keyword{color:#cba6f7}
.hljs-string{color:#a6e3a1}
.hljs-comment{color:#6c7086;font-style:italic}
.hljs-function{color:#89b4fa}
.hljs-number{color:#fab387}
.hljs-type{color:#f9e2af}
.hljs-attr{color:#89dceb}
.hljs-built_in{color:#f38ba8}
.hljs-title{color:#89b4fa}
.hljs-params{color:#f2cdcd}

/* ===== Responsive ===== */
@media (max-width:768px){
  #menu-toggle{display:flex}
  #sidebar{
    position:fixed;left:-290px;top:0;z-index:99;
    transition:left .25s ease;box-shadow:4px 0 20px rgba(0,0,0,0.4);
  }
  #sidebar.open{left:0}
  .sidebar-overlay{display:block;position:fixed;inset:0;z-index:98;background:rgba(0,0,0,0.5)}
  .sidebar-overlay.hidden{display:none}
  #content-wrapper{margin-left:0}
  #content{padding:24px 20px 60px}
  #content h1{font-size:22px}
}
</style>
</head>
<body>

<div id="app">
  <button id="menu-toggle" onclick="toggleSidebar()" title="菜单">☰</button>
  <div class="sidebar-overlay hidden" id="overlay" onclick="toggleSidebar()"></div>

  <!-- ===== Sidebar ===== -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <span class="logo">📚</span>
      <h2>开发文档</h2>
      <a href="index.html">← 返回首页</a>
    </div>
    <div id="sidebar-nav"></div>
    <div class="sidebar-footer">StarDebate ★ 辩之星</div>
  </nav>

  <!-- ===== Content ===== -->
  <main id="content-wrapper">
    <div id="content">
      <div class="loading">选择左侧文档开始阅读</div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<script>
// ===== Category Configuration =====
const CATEGORIES = {
  'user-guide':  { label: '📘 用户指南',       order: 1 },
  'dev-guide':   { label: '📗 开发文档',       order: 2 }
};

// ===== File Manifest =====
const FILES = [
  { dir:'user-guide',   file:'用户指南.md',                  slug:'user-guide'},
  { dir:'user-guide',   file:'命令速查.md',                  slug:'cmd-ref'},
  { dir:'user-guide',   file:'调试台使用指南.md',            slug:'debug-guide'},
  { dir:'user-guide',   file:'起居注说明.md',                slug:'chronicle'},
  { dir:'user-guide',   file:'底层事件系统.md',              slug:'event-system'},
  { dir:'dev-guide',    file:'plugin_dev_guide.md',          slug:'plugin-dev'},
  { dir:'dev-guide',    file:'extension_dev_guide.md',       slug:'extension-dev'},
  { dir:'dev-guide',    file:'theme_dev_guide.md',           slug:'theme-dev'},
  { dir:'dev-guide',    file:'stardebate_format_spec.md',    slug:'stardebate-format'},
  { dir:'dev-guide',    file:'stp_format.md',                slug:'stp-format'},
  { dir:'dev-guide',    file:'siliconui_controls_reference.md', slug:'siliconui-ref'},
  { dir:'dev-guide',    file:'star_spinbox_design.md',       slug:'spinbox-design'},
  { dir:'dev-guide',    file:'star_button.md',               slug:'star-button'},
  { dir:'dev-guide',    file:'LICENSE.md',                   slug:'license'}
];

// ===== Marked Config =====
marked.setOptions({
  gfm:true, breaks:false,
  highlight:function(code,lang){
    if(lang && hljs){
      try{return hljs.highlight(code,{language:lang}).value}
      catch(e){}
    }
    return code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
});

// ===== State =====
let currentSlug = null;
const titleCache = {};

// ===== Build Sidebar =====
function buildSidebar(){
  const nav = document.getElementById('sidebar-nav');
  const grouped = {};
  FILES.forEach(f=>{
    if(!grouped[f.dir]) grouped[f.dir] = [];
    grouped[f.dir].push(f);
  });

  const dirs = Object.keys(grouped).sort((a,b)=>{
    const oa = (CATEGORIES[a]||{}).order||99;
    const ob = (CATEGORIES[b]||{}).order||99;
    return oa-ob;
  });

  dirs.forEach(dir=>{
    const cat = CATEGORIES[dir]||{label:dir};
    const files = grouped[dir];

    const group = document.createElement('div');
    group.className = 'cat-group';
    group.innerHTML = `<div class="cat-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="arrow">▼</span><span>${cat.label}</span><span class="cat-count">${files.length}</span>
    </div><ul class="cat-files">${files.map(f=>{
      return `<li><a href="#${f.slug}" data-slug="${f.slug}" data-dir="${f.dir}" data-file="${f.file}" onclick="loadDoc('${f.slug}','${f.dir}','${f.file.replace(/'/g,"&#39;")}');return false">${f.file.replace('.md','')}</a></li>`;
    }).join('')}</ul>`;
    nav.appendChild(group);
  });
}

// ===== Fetch Titles (async, non-blocking) =====
function prefetchTitles(){
  const cached = JSON.parse(localStorage.getItem('sd_doc_titles')||'{}');
  FILES.forEach(f=>{
    const a = document.querySelector(`a[data-slug="${f.slug}"]`);
    if(!a) return;
    if(cached[f.slug]){
      a.textContent = cached[f.slug];
      titleCache[f.slug] = cached[f.slug];
    }
  });
  // async load uncached titles
  FILES.forEach(f=>{
    if(titleCache[f.slug]) return;
    fetch(`dev-docs/${f.dir}/${encodeURIComponent(f.file)}`)
      .then(r=>r.text())
      .then(text=>{
        const m = text.match(/^#\s+(.+)/m);
        const title = m ? m[1].trim() : f.file.replace('.md','');
        titleCache[f.slug] = title;
        const a = document.querySelector(`a[data-slug="${f.slug}"]`);
        if(a) a.textContent = title;
        // save to cache
        const c = JSON.parse(localStorage.getItem('sd_doc_titles')||'{}');
        c[f.slug] = title;
        localStorage.setItem('sd_doc_titles',JSON.stringify(c));
      })
      .catch(()=>{});
  });
}

// ===== Load Document =====
function loadDoc(slug,dir,file){
  currentSlug = slug;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">加载中...</div>';

  // Update active link
  document.querySelectorAll('#sidebar a').forEach(a=>a.classList.remove('active'));
  const activeLink = document.querySelector(`a[data-slug="${slug}"]`);
  if(activeLink) activeLink.classList.add('active');

  // On mobile, close sidebar
  if(window.innerWidth <= 768) closeSidebar();

  // Update URL hash
  history.replaceState(null,null,`#${slug}`);

  fetch(`dev-docs/${dir}/${encodeURIComponent(file)}`)
    .then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.text()})
    .then(text=>{
      const html = marked.parse(text);
      content.innerHTML = html;

      // Post-process internal links
      content.querySelectorAll('a[href]').forEach(a=>{
        const href = a.getAttribute('href');

        // External links → new tab
        if(href.startsWith('http')){
          a.setAttribute('target','_blank');
          a.setAttribute('rel','noopener');
          return;
        }

        // Anchor links (#section) → smooth scroll in content-wrapper
        if(href.startsWith('#')){
          a.addEventListener('click',e=>{
            e.preventDefault();
            const id = href.slice(1);
            let target = document.getElementById(id);
            // Fallback: find heading whose inner text matches (decoded)
            if(!target){
              const decoded = decodeURIComponent(id).replace(/[、，,.\-]/g,'');
              target = Array.from(content.querySelectorAll('h1,h2,h3,h4,h5,h6'))
                .find(h=>h.textContent.replace(/[、，,.\-]/g,'').trim() === decoded);
            }
            if(target){
              const wrapper = document.getElementById('content-wrapper');
              const top = target.offsetTop - wrapper.offsetTop - 16;
              wrapper.scrollTo({top, behavior:'smooth'});
            }
          });
          return;
        }

        // Cross-file .md links → route through loadDoc
        if(href.endsWith('.md')){
          const fileName = href.split('/').pop();
          const entry = FILES.find(f=>f.file === fileName);
          if(entry){
            a.addEventListener('click',e=>{
              e.preventDefault();
              loadDoc(entry.slug,entry.dir,entry.file);
            });
          }
        }
      });

      // Scroll to top
      document.getElementById('content-wrapper').scrollTop = 0;

      // Update document title
      const h1 = content.querySelector('h1');
      if(h1) document.title = h1.textContent + ' — StarDebate 文档';
    })
    .catch(err=>{
      content.innerHTML = `<div class="error">加载失败: ${err.message}<br><small>请检查文件是否存在</small></div>`;
    });
}

// ===== Sidebar Toggle (mobile) =====
function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('hidden');
}
function closeSidebar(){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.remove('open');
  ov.classList.add('hidden');
}

// ===== Init =====
document.addEventListener('DOMContentLoaded',()=>{
  buildSidebar();
  prefetchTitles();

  // Handle hash on load
  const hash = window.location.hash.replace('#','');
  if(hash){
    const entry = FILES.find(f=>f.slug===hash);
    if(entry) loadDoc(entry.slug,entry.dir,entry.file);
  }

  // Handle hash changes (back/forward)
  window.addEventListener('hashchange',()=>{
    const h = window.location.hash.replace('#','');
    if(!h) return;
    if(h === currentSlug) return;
    // File slug → load document
    if(FILES.some(f=>f.slug===h)){
      const entry = FILES.find(f=>f.slug===h);
      if(entry) loadDoc(entry.slug,entry.dir,entry.file);
      return;
    }
    // Non-file-slug hash (e.g. ToC anchor) → restore the file slug hash
    if(currentSlug){
      history.replaceState(null,null,`#${currentSlug}`);
    }
  });
});
</script>
</body>
</html>
